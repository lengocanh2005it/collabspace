http:
  routers:
    # Block internal S2S API paths from the public gateway (Phase B4).
    block-internal-apis-router:
      rule: "PathPrefix(`/api/v1/workspaces/internal`) || PathPrefix(`/api/v1/users/internal`)"
      priority: 200
      entryPoints:
        - web
      service: internal-api-reject

    # ============================================================
    # Auth Service — prefix: /api/v1/auth (NestJS globalPrefix: api/v1)
    # ============================================================
    auth-me-router:
      rule: "Path(`/api/v1/auth/me`)"
      service: auth-service
      priority: 100
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - auth-header
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

    auth-router:
      rule: "PathPrefix(`/api/v1/auth`)"
      service: auth-service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

    # ============================================================
    # User Service — prefix: /api/v1/users (NestJS globalPrefix: api/v1)
    # ============================================================
    user-router:
      rule: "PathPrefix(`/api/v1/users`)"
      service: user-service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

    # ============================================================
    # Workspace Service — prefix: /api/v1/workspaces
    # ============================================================
    workspace-invitations-router:
      rule: "PathPrefix(`/api/v1/invitations`)"
      service: workspace-service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

    workspace-router:
      rule: "PathPrefix(`/api/v1/workspaces`)"
      service: workspace-service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

    # ============================================================
    # Task Service — prefix: /api/v1/tasks
    # ============================================================
    task-router:
      rule: "PathPrefix(`/api/v1/tasks`)"
      service: task-service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

    task-docs-router:
      rule: "PathPrefix(`/docs`) && Headers(`X-Service`, `task`)"
      service: task-service
      entryPoints:
        - web

    # ============================================================
    # Notification Service — prefix: /api/v1/notifications
    # ============================================================
    notification-stream-router:
      rule: "Path(`/api/v1/notifications/stream`)"
      service: notification-service
      priority: 110
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - rate-limit
        - security-headers

    notification-router:
      rule: "PathPrefix(`/api/v1/notifications`)"
      service: notification-service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

    # ============================================================
    # Analytics Service — prefix: /api/v1/analytics (platform admin only)
    # ============================================================
    analytics-health-router:
      rule: "PathPrefix(`/api/v1/analytics/health`)"
      service: analytics-service
      priority: 150
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - rate-limit
        - security-headers

    analytics-router:
      rule: "PathPrefix(`/api/v1/analytics`)"
      service: analytics-service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

    # ============================================================
    # DLQ Service — prefix: /api/v1/dlq (platform admin only)
    # ============================================================
    dlq-router:
      rule: "PathPrefix(`/api/v1/dlq`)"
      service: dlq-service
      entryPoints:
        - web
      middlewares:
        - cors-headers
        - strip-identity-headers
        - forward-auth
        - rate-limit
        - security-headers
        - retry-policy
        - circuit-breaker

  services:
    internal-api-reject:
      loadBalancer:
        servers: []

    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:3000"
        healthCheck:
          path: /api/v1/auth/health
          interval: 10s
          timeout: 3s
    user-service:
      loadBalancer:
        servers:
          - url: "http://user-service:3000"
        healthCheck:
          path: /api/v1/users/health
          interval: 10s
          timeout: 3s
    workspace-service:
      loadBalancer:
        servers:
          - url: "http://workspace-service:8080"
        healthCheck:
          path: /api/v1/workspaces/health
          interval: 10s
          timeout: 5s
    task-service:
      loadBalancer:
        servers:
          - url: "http://task-service:3000"
        healthCheck:
          path: /api/v1/tasks/health
          interval: 10s
          timeout: 3s
    notification-service:
      loadBalancer:
        servers:
          - url: "http://notification-service:3000"
        healthCheck:
          path: /api/v1/notifications/health
          interval: 10s
          timeout: 3s
    dlq-service:
      loadBalancer:
        servers:
          - url: "http://dlq-service:3000"
        healthCheck:
          path: /api/v1/dlq/health/ready
          interval: 10s
          timeout: 3s
    analytics-service:
      loadBalancer:
        servers:
          - url: "http://analytics-service:3000"
        healthCheck:
          path: /api/v1/analytics/health/ready
          interval: 10s
          timeout: 3s
