http:
  middlewares:
    # Remove client-supplied identity headers before forward-auth sets trusted values.
    # See .claude/docs/service-contracts.md — Auth Header Propagation.
    strip-identity-headers:
      headers:
        customRequestHeaders:
          X-User-Id: ""
          X-User-Name: ""
          X-Username: ""
          X-Role: ""
          X-Roles: ""
          X-Permissions: ""
          X-Email-Verified: ""
          X-Workspace-Id: ""

    forward-auth:
      forwardAuth:
        address: "http://auth-service:3000/api/v1/auth/verify"
        trustForwardHeader: true
        authRequestHeaders:
          - "Authorization"
          - "Cookie"
          - "X-Request-Id"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Name"
          - "X-Username"
          - "X-Role"
          - "X-Roles"
          - "X-Permissions"
          - "X-Email-Verified"
          - "X-Workspace-Id"
          - "X-Request-Id"

    auth-header:
      headers:
        customRequestHeaders:
          X-Custom-Auth: "true"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    cors-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "X-Requested-With"
          - "X-Request-Id"
          - "Accept"
        accessControlAllowOriginList:
          - "http://localhost:5173"
          - "http://localhost:3000"
          - "http://localhost"
        accessControlAllowCredentials: true
        accessControlMaxAge: 3600
        addVaryHeader: true

    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""

    retry-policy:
      retry:
        attempts: 3
        initialInterval: 100ms

    circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.3"
