http:
  middlewares:
    forward-auth:
      forwardAuth:
        address: "http://auth-service:3000/api/v1/auth/verify"
        trustForwardHeader: true
        authRequestHeaders:
          - "Authorization"
          - "Cookie"
          - "X-Request-Id"
        authResponseHeaders:
          - "X-User-Id"
          - "X-Role"
          - "X-Workspace-Id"
          - "X-Request-Id"

    auth-header:
      headers:
        customRequestHeaders:
          X-Custom-Auth: "true"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    cors-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "X-Requested-With"
        accessControlAllowOriginList:
          - "*"
        accessControlMaxAge: 3600
        addVaryHeader: true
