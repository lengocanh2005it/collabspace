# Logstash Configuration for CollabSpace
# Agent BRAVO - Infrastructure Engineer: Phan Phu Tho
# Last updated: 2026-04-03
#
# Pipeline: Services (JSON logs via TCP) -> Logstash -> Elasticsearch
# Services should emit structured JSON logs to stdout, Docker captures them,
# and we can either use Docker log driver or direct TCP shipping.

input {
  # TCP input for direct log shipping from services
  tcp {
    port => 5044
    codec => json_lines
    type => "service-logs"
  }

  # Beats input for Filebeat (optional - for file-based logs)
  beats {
    port => 5045
    type => "filebeat"
  }

  # UDP input for syslog-style logs
  udp {
    port => 5046
    codec => json
    type => "syslog"
  }
}

filter {
  # Parse timestamp if present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd HH:mm:ss"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Extract service name for index routing
  if [service] {
    mutate {
      add_field => { "[@metadata][service]" => "%{service}" }
    }
  } else if [container_name] {
    # Fallback to container name if service field not present
    mutate {
      add_field => { "[@metadata][service]" => "%{container_name}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][service]" => "unknown" }
    }
  }

  # Normalize log levels
  if [level] {
    mutate {
      lowercase => ["level"]
    }
    # Map common level names
    translate {
      field => "level"
      destination => "log_level"
      dictionary => {
        "trace" => "trace"
        "debug" => "debug"
        "info" => "info"
        "warn" => "warn"
        "warning" => "warn"
        "error" => "error"
        "err" => "error"
        "fatal" => "fatal"
        "critical" => "fatal"
      }
      fallback => "info"
    }
  } else {
    mutate {
      add_field => { "log_level" => "info" }
    }
  }

  # Parse request metadata if present (for HTTP request logs)
  if [request] {
    ruby {
      code => '
        request = event.get("request")
        if request.is_a?(Hash)
          event.set("http_method", request["method"]) if request["method"]
          event.set("http_path", request["path"]) if request["path"]
          event.set("http_status", request["status"]) if request["status"]
          event.set("http_duration_ms", request["duration"]) if request["duration"]
        end
      '
    }
  }

  # Extract trace context if present (for distributed tracing correlation)
  if [traceId] {
    mutate {
      rename => { "traceId" => "trace_id" }
    }
  }
  if [spanId] {
    mutate {
      rename => { "spanId" => "span_id" }
    }
  }

  # Add environment tag
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:development}"
      "project" => "collabspace"
    }
  }

  # Geoip lookup for client IPs (if present)
  if [client_ip] and [client_ip] !~ /^(127\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)/ {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Remove internal/sensitive fields
  mutate {
    remove_field => ["@version", "host", "port"]
  }

  # Add fingerprint for deduplication
  fingerprint {
    source => ["message", "service", "@timestamp"]
    target => "[@metadata][fingerprint]"
    method => "SHA256"
  }
}

output {
  # Route to service-specific indices
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch}:${ELASTICSEARCH_PORT:9200}"]
    index => "collabspace-%{[@metadata][service]}-%{+YYYY.MM.dd}"
    document_id => "%{[@metadata][fingerprint]}"
    
    # Template settings for optimal log storage
    template_name => "collabspace-logs"
    template_overwrite => true
    template => "/usr/share/logstash/templates/collabspace-template.json"
    
    # Retry on failure
    retry_on_conflict => 3
  }

  # Also output to stdout for debugging (disable in production)
  if "${DEBUG_LOGS:false}" == "true" {
    stdout {
      codec => rubydebug
    }
  }

  # Dead letter queue for failed events
  # (requires dead_letter_queue.enable: true in logstash.yml)
}
