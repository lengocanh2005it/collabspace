input {
  # Accept logs from Docker containers via GELF or beats
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse Docker container name to extract service name
  if [container][name] {
    mutate {
      add_field => { "service_name" => "%{[container][name]}" }
    }
  }

  # Parse JSON logs if they are structured
  if [message] =~ /^{.*}$/ {
    json {
      source => "message"
      target => "parsed_json"
    }
    
    # If NestJS Winston JSON log format
    if [parsed_json][level] {
      mutate {
        replace => { "log_level" => "%{[parsed_json][level]}" }
      }
    }
  }

  # Add generic tags for errors
  if [log_level] == "error" or [log_level] == "fatal" {
    mutate {
      add_tag => ["error_log"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "collabspace-logs-%{+YYYY.MM.dd}"
    # Security is disabled for dev environment
    # user => "elastic"
    # password => "changeme"
  }
  
  # Print to console for debugging Logstash itself
  stdout {
    codec => rubydebug { metadata => true }
  }
}
