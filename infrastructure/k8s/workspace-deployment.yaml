# Workspace Service Kubernetes Deployment
# Agent BRAVO - Infrastructure Engineer: Phan Phu Tho
# Last updated: 2026-04-03
#
# CRITICAL: Port 8080 (Java/Kotlin - NOT 3000 like Node.js services)
# Health: /workspaces/health
# Database: PostgreSQL (collabspace_workspace)
# Migrations: Flyway (NOT Prisma)

apiVersion: v1
kind: ConfigMap
metadata:
  name: workspace-service-config
  namespace: collabspace
  labels:
    app: workspace-service
    app.kubernetes.io/name: workspace-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: collabspace
data:
  # Java/Spring Boot environment
  SPRING_PROFILES_ACTIVE: "production"
  SERVER_PORT: "8080"
  # Database
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/collabspace_workspace"
  SPRING_FLYWAY_ENABLED: "true"
  # RabbitMQ
  SPRING_RABBITMQ_HOST: "rabbitmq"
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_VIRTUAL_HOST: "collabspace"
  # Service discovery
  AUTH_SERVICE_URL: "http://auth-service:3000"
  USER_SERVICE_URL: "http://user-service:3000"
  # Tracing
  JAEGER_AGENT_HOST: "jaeger"
  JAEGER_AGENT_PORT: "6831"
  # JVM options
  JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"

---
apiVersion: v1
kind: Secret
metadata:
  name: workspace-service-secrets
  namespace: collabspace
  labels:
    app: workspace-service
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "postgres"
  SPRING_DATASOURCE_PASSWORD: "postgres"  # CHANGE IN PRODUCTION
  JWT_SECRET: "change-me-in-production"  # CHANGE IN PRODUCTION
  SPRING_RABBITMQ_USERNAME: "guest"  # CHANGE IN PRODUCTION
  SPRING_RABBITMQ_PASSWORD: "guest"  # CHANGE IN PRODUCTION

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-service
  namespace: collabspace
  labels:
    app: workspace-service
    app.kubernetes.io/name: workspace-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: collabspace
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workspace-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: workspace-service
        app.kubernetes.io/name: workspace-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/workspaces/metrics"
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: workspace-service
          image: collabspace/workspace-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080  # CRITICAL: 8080 for Java, NOT 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: workspace-service-config
            - secretRef:
                name: workspace-service-secrets
          resources:
            requests:
              memory: "256Mi"  # Java needs more memory
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /workspaces/health
              port: 8080
            initialDelaySeconds: 30  # Java apps take longer to start
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /workspaces/health
              port: 8080
            initialDelaySeconds: 60  # Give Java app time to fully start
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - workspace-service
                topologyKey: kubernetes.io/hostname
