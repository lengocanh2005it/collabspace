# Metrics exporters for Postgres, Redis, and MongoDB (K8s)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: collabspace
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          env:
            - name: REDIS_ADDR
              value: "redis://:collabspace123@redis:6379"
          ports:
            - containerPort: 9121

---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: collabspace
  labels:
    app: redis-exporter
spec:
  selector:
    app: redis-exporter
  ports:
    - port: 9121
      targetPort: 9121

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: collabspace
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable"
          ports:
            - containerPort: 9187

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: collabspace
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-exporter
  namespace: collabspace
  labels:
    app: mongodb-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-exporter
  template:
    metadata:
      labels:
        app: mongodb-exporter
    spec:
      containers:
        - name: mongodb-exporter
          image: percona/mongodb_exporter:latest
          args:
            - --mongodb.uri=mongodb://admin:password@mongo:27017
          ports:
            - containerPort: 9216

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-exporter
  namespace: collabspace
  labels:
    app: mongodb-exporter
spec:
  selector:
    app: mongodb-exporter
  ports:
    - port: 9216
      targetPort: 9216
