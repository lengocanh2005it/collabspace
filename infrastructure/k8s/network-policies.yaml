# ================================================
# NetworkPolicies for CollabSpace — trust boundaries (Phase B4)
# ================================================
# Default deny, then explicit allow lists per destination.
# Internal HTTP routes (/users/internal, /workspaces/internal) are reachable
# only from authorized app pods — not from Traefik (see gateway block routes).
#
# Apply: kubectl apply -f infrastructure/k8s/network-policies.yaml

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: collabspace
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Traefik → public HTTP only (not gRPC)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-services
  namespace: collabspace
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          [auth-service, user-service, workspace-service, task-service, notification-service]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - port: 3000
          protocol: TCP
        - port: 8080
          protocol: TCP

---
# auth-service: HTTP from Traefik; gRPC verify from peer services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service-ingress
  namespace: collabspace
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  [user-service, workspace-service, task-service, notification-service]
      ports:
        - port: 50051
          protocol: TCP

---
# user-service: public HTTP + gRPC profile + internal replica API from task/notification
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-service-ingress
  namespace: collabspace
spec:
  podSelector:
    matchLabels:
      app: user-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - port: 50052
          protocol: TCP
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [task-service, notification-service]
      ports:
        - port: 3000
          protocol: TCP

---
# workspace-service: public HTTP from Traefik; internal membership from task-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-workspace-service-ingress
  namespace: collabspace
spec:
  podSelector:
    matchLabels:
      app: workspace-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: task-service
      ports:
        - port: 8080
          protocol: TCP

---
# task-service: public HTTP from Traefik only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-task-service-ingress
  namespace: collabspace
spec:
  podSelector:
    matchLabels:
      app: task-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - port: 3000
          protocol: TCP

---
# notification-service: public HTTP from Traefik only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-notification-service-ingress
  namespace: collabspace
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - port: 3000
          protocol: TCP

---
# PostgreSQL ← auth, user, workspace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-clients
  namespace: collabspace
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth-service, user-service, workspace-service, backup-postgres, postgres-exporter]
        - podSelector:
            matchLabels:
              app: debezium-connect
        - podSelector:
            matchLabels:
              cnpg.io/cluster: postgres
        - podSelector:
            matchExpressions:
              - key: collabspace.dev/migration
                operator: Exists
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP

---
# MongoDB ← task, notification
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mongo-clients
  namespace: collabspace
spec:
  podSelector:
    matchLabels:
      app: mongo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [task-service, notification-service]
      ports:
        - port: 27017
          protocol: TCP

---
# Redis ← auth, notification
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-clients
  namespace: collabspace
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth-service, notification-service]
      ports:
        - port: 6379
          protocol: TCP

---
# Prometheus → metrics scrape
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: collabspace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 3000
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 15692
          protocol: TCP
