# ================================================
# PostgreSQL StatefulSet for CollabSpace
# Infrastructure Engineer: Phan Phu Tho
# ================================================
# Creates 3 databases: collabspace_auth, collabspace_user, collabspace_workspace

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: collabspace
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: collabspace
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: collabspace
  labels:
    app.kubernetes.io/name: postgres
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
      CREATE DATABASE collabspace_auth;
      CREATE DATABASE collabspace_user;
      CREATE DATABASE collabspace_workspace;
    EOSQL

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: collabspace
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: collabspace
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secrets
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: collabspace
  labels:
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
