apiVersion: v1
kind: ConfigMap
metadata:
  name: collabspace-shared-config
  namespace: collabspace
  labels:
    app.kubernetes.io/part-of: collabspace
data:
  NODE_ENV: "production"
  JWT_EXPIRY: "24h"
  # In production, secrets like JWT_SECRET should be in a Secret, not ConfigMap.
  # But for dev consistency, we map common non-secret values here.
