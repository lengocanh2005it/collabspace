# Task Service Kubernetes Deployment
# Agent BRAVO - Infrastructure Engineer: Phan Phu Tho
# Last updated: 2026-04-03
#
# Port: 3000 (Node.js)
# Health: /tasks/health
# Database: MongoDB (collabspace_task)
# Migrations: Custom migrate.js (NOT Prisma)

apiVersion: v1
kind: ConfigMap
metadata:
  name: task-service-config
  namespace: collabspace
  labels:
    app: task-service
    app.kubernetes.io/name: task-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: collabspace
data:
  NODE_ENV: "production"
  PORT: "3000"
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  MONGO_DB: "collabspace_task"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/collabspace"
  RABBITMQ_ENABLED: "true"
  RABBITMQ_QUEUE: "task-service"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "collabspace"
  RABBITMQ_EXCHANGE: "collabspace_exchange"
  AUTH_SERVICE_URL: "http://auth-service:3000"
  USER_SERVICE_URL: "http://user-service:3000"
  WORKSPACE_SERVICE_URL: "http://workspace-service:8080"
  JAEGER_AGENT_HOST: "jaeger"
  JAEGER_AGENT_PORT: "6831"
  LOG_LEVEL: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: task-service-secrets
  namespace: collabspace
  labels:
    app: task-service
type: Opaque
stringData:
  MONGO_USER: ""  # Optional: Add if MongoDB auth enabled
  MONGO_PASSWORD: ""  # Optional: Add if MongoDB auth enabled
  JWT_SECRET: "change-me-in-production"  # CHANGE IN PRODUCTION
  RABBITMQ_USER: "guest"  # CHANGE IN PRODUCTION
  RABBITMQ_PASSWORD: "guest"  # CHANGE IN PRODUCTION

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: collabspace
  labels:
    app: task-service
    app.kubernetes.io/name: task-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: collabspace
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: task-service
        app.kubernetes.io/name: task-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/tasks/metrics"
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: task-service
          image: collabspace/task-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: task-service-config
            - secretRef:
                name: task-service-secrets
          env:
            # Construct MongoDB URI from components
            - name: MONGO_URI
              value: "mongodb://$(MONGO_HOST):$(MONGO_PORT)/$(MONGO_DB)"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /api/tasks/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/tasks/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - task-service
                topologyKey: kubernetes.io/hostname
