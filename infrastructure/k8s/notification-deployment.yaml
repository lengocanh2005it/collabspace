# Notification Service Kubernetes Deployment
# Agent BRAVO - Infrastructure Engineer: Phan Phu Tho
# Last updated: 2026-04-03
#
# Port: 3000 (Node.js)
# Health: /notifications/health
# Storage: Redis (primary) + MongoDB (optional persistence)
# Consumes: RabbitMQ events (TASK_ASSIGNED, WORKSPACE_INVITED, COMMENT_CREATED)

apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: collabspace
  labels:
    app: notification-service
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: collabspace
data:
  NODE_ENV: "production"
  PORT: "3000"
  # Redis configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  # RabbitMQ configuration
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "collabspace"
  RABBITMQ_EXCHANGE: "collabspace_exchange"
  # Queues to consume
  RABBITMQ_QUEUES: "task_assigned,workspace_invited,comment_created"
  # Service discovery
  AUTH_SERVICE_URL: "http://auth-service:3000"
  USER_SERVICE_URL: "http://user-service:3000"
  # Tracing
  JAEGER_AGENT_HOST: "jaeger"
  JAEGER_AGENT_PORT: "6831"
  LOG_LEVEL: "info"
  # WebSocket configuration
  WS_ENABLED: "true"
  WS_PATH: "/notifications/ws"

---
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secrets
  namespace: collabspace
  labels:
    app: notification-service
type: Opaque
stringData:
  REDIS_PASSWORD: "collabspace123"  # CHANGE IN PRODUCTION
  JWT_SECRET: "change-me-in-production"  # CHANGE IN PRODUCTION
  RABBITMQ_USER: "guest"  # CHANGE IN PRODUCTION
  RABBITMQ_PASSWORD: "guest"  # CHANGE IN PRODUCTION

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: collabspace
  labels:
    app: notification-service
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: collabspace
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
        app.kubernetes.io/name: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/notifications/metrics"
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: notification-service
          image: collabspace/notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /notifications/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /notifications/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - notification-service
                topologyKey: kubernetes.io/hostname
