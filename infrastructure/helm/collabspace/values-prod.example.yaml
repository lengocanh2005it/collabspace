# Mẫu values production cho Droplet k3s (8 GiB RAM).
# KHÔNG commit file values-prod.yaml thật — chỉ commit file .example này.
#
# Tạo file deploy:
#   cp values-prod.example.yaml values-prod.yaml
#   # hoặc từ repo root:
#   ./infrastructure/deploy/prepare-prod-values.sh
#
# Cài đặt (Phase 3):
#   sudo bash infrastructure/deploy/helm-deploy-phase3.sh
#   sudo bash infrastructure/deploy/verify-phase3.sh
#
# Lộ trình: docs/deployment-k3s-phases.md

global:
  imagePullPolicy: Always
  # Secret K8s để pull image GHCR private (tạo thủ công hoặc Phase 2):
  # kubectl create secret docker-registry ghcr-credentials -n collabspace \
  #   --docker-server=ghcr.io --docker-username=GHCR_OWNER --docker-password=GHCR_TOKEN
  imagePullSecrets:
    - name: ghcr-credentials
  externalSecrets:
    enabled: true
    vaultKvPath: collabspace/prod
  # Bitnami subcharts + URL trong ConfigMap vẫn đọc global.secrets khi install.
  # Giá trị PHẢI khớp Vault path secret/collabspace/prod (inject qua prepare-prod-values).
  secrets:
    jwtSecret: "REPLACE_ME"
    serviceJwtSecret: "REPLACE_ME"
    postgresPassword: "REPLACE_ME"
    mongoUsername: admin
    mongoPassword: "REPLACE_ME"
    redisPassword: "REPLACE_ME"
    metricsAuthToken: "REPLACE_ME"
    azureStorageConnectionString: "REPLACE_ME_AZURE"
  azureStorage:
    containerName: task-attachments
    maxFileSize: "5242880"

postgresql:
  auth:
    postgresPassword: "REPLACE_ME"
    password: "REPLACE_ME"
  primary:
    persistence:
      size: 8Gi
      storageClass: do-block-storage
    extendedConfiguration: |
      wal_level = logical
      max_replication_slots = 4
      max_wal_senders = 4
    resources:
      requests:
        memory: 256Mi
        cpu: 200m
      limits:
        memory: 512Mi
        cpu: 500m

mongodb:
  architecture: replicaset
  replicaSetName: rs0
  replicaCount: 1
  auth:
    rootUser: admin
    rootPassword: "REPLACE_ME"
  persistence:
    size: 8Gi
    storageClass: do-block-storage
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

redis:
  auth:
    password: "REPLACE_ME"
  master:
    persistence:
      size: 2Gi
      storageClass: do-block-storage
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 384Mi
        cpu: 250m

# Kafka + Debezium Connect (event bus — required for cross-service events)
kafka:
  enabled: true
  persistence:
    size: 8Gi
    storageClass: do-block-storage
  resources:
    requests:
      memory: 384Mi
      cpu: 200m
    limits:
      memory: 768Mi
      cpu: 750m
  exporter:
    enabled: true

debeziumConnect:
  enabled: true
  connectors:
    enabled: true
    registerOnUpgrade: false
  resources:
    requests:
      memory: 384Mi
      cpu: 200m
    limits:
      memory: 768Mi
      cpu: 750m

traefik:
  deployment:
    replicas: 1
  service:
    type: LoadBalancer
  ports:
    web:
      redirectTo:
        port: websecure
        permanent: true
  additionalArguments:
    - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
    - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    - "--certificatesresolvers.letsencrypt.acme.email=REPLACE_ME_ACME_EMAIL"
    - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
  persistence:
    enabled: true
    size: 128Mi
    storageClass: do-block-storage

gateway:
  publicHost: REPLACE_ME_DOMAIN
  tls:
    enabled: true
    certResolver: letsencrypt
    sans: []   # thêm "www.REPLACE_ME_DOMAIN" nếu DNS có CNAME www
  grafana:
    expose: true
  swagger:
    expose: true
  cors:
    allowOrigins:
      - "*"
    allowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowHeaders:
      - Content-Type
      - Authorization
      - Accept
      - Origin
      - X-Requested-With
      - X-Request-Id
      - Cache-Control

grafana:
  env:
    GF_SERVER_ROOT_URL: "https://REPLACE_ME_DOMAIN/grafana/"
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"

networkPolicies:
  enabled: true

observability:
  prometheus:
    enabled: true
    retention: 7d
    storageSize: 3Gi
  exporters:
    enabled: true
  alertmanager:
    slack:
      enabled: true
      channel: "#nouveau-canal"
      # Prod: webhook inject qua Vault → ESO alertmanager-slack-secret (phase0.env SLACK_ALERT_WEBHOOK_URL)
      webhookUrl: ""

backup:
  enabled: true
  postgres:
    schedule: "0 2 * * *"
  mongo:
    schedule: "30 2 * * *"
  retention:
    days: 7
  doSpaces:
    endpoint: "https://sgp1.digitaloceanspaces.com"   # đổi region nếu khác: nyc3, fra1, …
    bucket: "collabspace-bucket"
    region: "sgp1"
    prefix: "backups"
    # Lấy key từ DO console → Spaces → Access Keys (không phải API token)
    # Trong prod (ESO enabled): để trống — inject qua backup-spaces-secret từ Vault
    accessKey: ""
    secretKey: ""

hpa:
  enabled: false

pdb:
  enabled: true
  minAvailable: 1

apps:
  auth-service:
    replicas: 1
    image:
      repository: ghcr.io/REPLACE_ME_GHCR_OWNER/collabspace-auth-service
      tag: REPLACE_ME_IMAGE_TAG
    extraEnv:
      GRPC_ENABLED: "true"
      GRPC_URL: "0.0.0.0:50051"
      USER_SERVICE_GRPC_URL: user-service:50052
      REDIS_HOST: redis-master
      OUTBOX_ENABLED: "true"
      BREVO_SENDER_EMAIL: REPLACE_ME_BREVO_SENDER_EMAIL
      BREVO_SENDER_NAME: REPLACE_ME_BREVO_SENDER_NAME
      EMAIL_DELIVERY_TIMEOUT_MS: "15000"
      EMAIL_QUEUE_TIMEOUT_MS: "5000"
      EMAIL_JOB_MAX_ATTEMPTS: "5"
      GRAPHILE_WORKER_ENABLED: "true"
      GRAPHILE_WORKER_CONCURRENCY: "5"

  user-service:
    replicas: 1
    image:
      repository: ghcr.io/REPLACE_ME_GHCR_OWNER/collabspace-user-service
      tag: REPLACE_ME_IMAGE_TAG
    extraEnv:
      GRPC_ENABLED: "true"
      GRPC_URL: "0.0.0.0:50052"
      AUTH_SERVICE_GRPC_URL: auth-service:50051
      AUTH_SERVICE_HTTP_URL: http://auth-service:3000
      AUTH_SERVICE_HTTP_TIMEOUT_MS: "3000"
      USER_OUTBOX_PUBLISH_MODE: "debezium"

  workspace-service:
    replicas: 1
    image:
      repository: ghcr.io/REPLACE_ME_GHCR_OWNER/collabspace-workspace-service
      tag: REPLACE_ME_IMAGE_TAG
    extraEnv:
      AUTH_SERVICE_GRPC_URL: auth-service:50051
      WORKSPACE_OUTBOX_ENABLED: "true"
      WORKSPACE_OUTBOX_PUBLISH_MODE: "debezium"
      DATABASE_SYNCHRONIZE: "false"
      ALLOW_DEV_IDENTITY_HEADERS: "false"

  task-service:
    replicas: 1
    image:
      repository: ghcr.io/REPLACE_ME_GHCR_OWNER/collabspace-task-service
      tag: REPLACE_ME_IMAGE_TAG
    extraEnv:
      KAFKA_CONSUMERS_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "task-service"
      KAFKA_GROUP_ID: "task-service"
      TASK_OUTBOX_PUBLISH_MODE: "debezium"
      WORKSPACE_CLIENT_MODE: http
      WORKSPACE_SERVICE_URL: http://workspace-service:8080
      WORKSPACE_SERVICE_TIMEOUT_MS: "10000"
      TASK_OUTBOX_ENABLED: "true"
      ALLOW_DEV_IDENTITY_HEADERS: "false"

  dlq-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/REPLACE_ME_GHCR_OWNER/collabspace-dlq-service
      tag: REPLACE_ME_IMAGE_TAG
    extraEnv:
      KAFKA_CONSUMERS_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "dlq-service"
      KAFKA_GROUP_ID: "dlq-service"
      ALLOW_DEV_IDENTITY_HEADERS: "false"

  notification-service:
    replicas: 1
    image:
      repository: ghcr.io/REPLACE_ME_GHCR_OWNER/collabspace-notification-service
      tag: REPLACE_ME_IMAGE_TAG
    health:
      preStopSleep: 5
      terminationGracePeriodSeconds: 20
    extraEnv:
      KAFKA_CONSUMERS_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "notification-service"
      KAFKA_GROUP_ID: "notification-service"
      REDIS_HOST: redis-master
      WS_ENABLED: "false"
      WS_PATH: /notifications/ws
      ALLOW_DEV_IDENTITY_HEADERS: "false"

  analytics-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/REPLACE_ME_GHCR_OWNER/collabspace-analytics-service
      tag: REPLACE_ME_IMAGE_TAG
    extraEnv:
      KAFKA_CONSUMERS_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "analytics-service"
      KAFKA_GROUP_ID: "analytics-service"
      KAFKA_DLQ_TOPIC: "collabspace.dlq.events"
      KAFKA_CONSUMER_MAX_RETRIES: "3"
      KAFKA_CONSUMER_RETRY_DELAY_MS: "1000"
      KAFKA_TOPIC_USER_REGISTERED: "collabspace.user.registered"
      KAFKA_TOPIC_WORKSPACE_CREATED: "collabspace.workspace.workspace_created"
      KAFKA_TOPIC_WORKSPACE_PROJECT_CREATED: "collabspace.workspace.project_created"
      KAFKA_TOPIC_WORKSPACE_MEMBER_JOINED: "collabspace.workspace.member_joined"
      KAFKA_TOPIC_WORKSPACE_MEMBER_LEFT: "collabspace.workspace.member_left"
      KAFKA_TOPIC_TASK_CREATED: "collabspace.task.task_created"
      KAFKA_TOPIC_TASK_STATUS_CHANGED: "collabspace.task.task_status_changed"
      KAFKA_TOPIC_TASK_DELETED: "collabspace.task.task_deleted"
      AUTH_SERVICE_GRPC_URL: auth-service:50051
      AUTH_SERVICE_GRPC_TIMEOUT_MS: "3000"
      ALLOW_DEV_IDENTITY_HEADERS: "false"
