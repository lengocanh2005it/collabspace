# Default values for CollabSpace umbrella chart.
# Override with: helm upgrade --install collabspace . -f values-local.yaml

global:
  namespace: collabspace
  createNamespace: true
  imagePullPolicy: Always
  # Bitnami moved docker.io/bitnami/* to docker.io/bitnamilegacy/* (2025 catalog change).
  security:
    allowInsecureImages: true
  # imagePullSecrets: []  # e.g. - name: ghcr-credentials (production GHCR private)
  # When true, Helm does not render {app}-secrets — use External Secrets Operator + Vault
  # (infrastructure/vault/k8s/). Pods still mount secrets via secretRef in deployment.yaml.
  externalSecrets:
    enabled: true
    vaultKvPath: collabspace/dev
  secrets:
    jwtSecret: change-me-in-production
    serviceJwtSecret: change-me-in-production
    postgresPassword: postgres
    mongoUsername: admin
    mongoPassword: password
    redisPassword: collabspace123
    metricsAuthToken: ""
    brevoApiKey: ""
    # Optional — task attachments + user avatars (mock mode when empty)
    azureStorageConnectionString: ""
  azureStorage:
    containerName: task-attachments
    maxFileSize: "5242880"

infra:
  hosts:
    postgresql: postgres
    mongodb: mongo
    redis: redis-master

# --- CloudNativePG (DOKS HA PostgreSQL target) ---
# Install the CNPG operator before enabling this block:
#   helm upgrade --install cnpg cnpg/cloudnative-pg -n cnpg-system --create-namespace
cloudnativepg:
  enabled: false
  # Set false when the client-side Helm/kubectl RESTMapper cannot discover the
  # CRD yet; app wiring still switches to postgres-rw and the Cluster can be
  # created separately from infrastructure/k8s/postgres-cluster.yaml.
  renderCluster: true
  clusterName: postgres
  instances: 3
  superuserSecret:
    name: postgres-superuser
    create: true
    username: postgres
  storage:
    size: 8Gi
    storageClass: ""
  postgresql:
    pgHba:
      - host all all 0.0.0.0/0 md5
    parameters:
      wal_level: logical
      max_replication_slots: "8"
      max_wal_senders: "8"
  bootstrap:
    database: collabspace_auth
    owner: postgres
    postInitSQL:
      - CREATE DATABASE collabspace_user;
      - CREATE DATABASE collabspace_workspace;
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m
  scheduledBackup:
    enabled: false
    name: postgres-daily
    schedule: "0 2 * * *"
    backupOwnerReference: self

# --- Bitnami PostgreSQL (auth, user, workspace databases) ---
postgresql:
  enabled: true
  fullnameOverride: postgres
  image:
    repository: bitnamilegacy/postgresql
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  metrics:
    image:
      repository: bitnamilegacy/postgres-exporter
  auth:
    postgresPassword: postgres
    username: postgres
    password: postgres
    database: postgres
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
    extendedConfiguration: |
      wal_level = logical
      max_replication_slots = 4
      max_wal_senders = 4
    initdb:
      scripts:
        init-databases.sql: |
          CREATE DATABASE collabspace_auth;
          CREATE DATABASE collabspace_user;
          CREATE DATABASE collabspace_workspace;

# --- Bitnami MongoDB (task + notification) ---
mongodb:
  enabled: true
  fullnameOverride: mongo
  image:
    repository: bitnamilegacy/mongodb
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  metrics:
    image:
      repository: bitnamilegacy/mongodb-exporter
  architecture: replicaset
  replicaSetName: rs0
  replicaCount: 1
  auth:
    enabled: true
    rootUser: admin
    rootPassword: password
    replicaSetKey: Y29sbGFic3BhY2VyczBreXkx
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  arbiter:
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 200m

# --- Bitnami Redis (auth sessions, notification cache) ---
redis:
  enabled: true
  fullnameOverride: redis
  image:
    repository: bitnamilegacy/redis
  sentinel:
    image:
      repository: bitnamilegacy/redis-sentinel
  metrics:
    image:
      repository: bitnamilegacy/redis-exporter
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  kubectl:
    image:
      repository: bitnamilegacy/kubectl
  sysctl:
    image:
      repository: bitnamilegacy/os-shell
  architecture: standalone
  auth:
    enabled: true
    password: collabspace123
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 250m

# --- Kafka + Debezium Connect (event bus CDC) ---
kafka:
  enabled: true
  image:
    repository: apache/kafka
    tag: "3.8.0"
    pullPolicy: IfNotPresent
  heapOpts: "-Xmx384m -Xms256m"
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: 384Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 750m
  exporter:
    enabled: true
    image:
      repository: danielqsj/kafka-exporter
      tag: latest
      pullPolicy: IfNotPresent
    kafkaServer: kafka:9092
    resources:
      requests:
        memory: 32Mi
        cpu: 25m
      limits:
        memory: 64Mi
        cpu: 100m

debeziumConnect:
  enabled: true
  image:
    repository: quay.io/debezium/connect
    tag: 2.7.3.Final
    pullPolicy: IfNotPresent
  heapOpts: "-Xmx384m -Xms256m"
  bootstrapServers: kafka:9092
  groupId: collabspace-connect
  configStorageTopic: collabspace_connect_configs
  offsetStorageTopic: collabspace_connect_offsets
  statusStorageTopic: collabspace_connect_statuses
  resources:
    requests:
      memory: 384Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 750m
  connectors:
    enabled: true
    registerOnUpgrade: false

# --- Traefik ingress controller (API gateway) ---
traefik:
  enabled: true
  fullnameOverride: traefik
  ingressClass:
    enabled: true
    isDefaultClass: true
  deployment:
    replicas: 2
  ports:
    web:
      port: 80
      expose:
        default: true
    websecure:
      port: 443
      expose:
        default: true
    traefik:
      port: 8080
      expose:
        default: false
  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: false
    kubernetesIngress:
      enabled: true
  ingressRoute:
    dashboard:
      enabled: false
  service:
    type: LoadBalancer
  logs:
    general:
      level: INFO
    access:
      enabled: true
  metrics:
    prometheus:
      entryPoint: traefik
      addEntryPointsLabels: true
      addServicesLabels: true

# --- Gateway routes (Traefik IngressRoute CRDs) ---
gateway:
  enabled: true
  # Public host/IP for Grafana root_url (override in values-prod via PROD_DOMAIN).
  publicHost: ""
  tls:
    enabled: true          # Forced true per DevSecOps strict policy
    certResolver: letsencrypt
    sans: []                # e.g. ["www.ngocanh2005it.site"]
  grafana:
    expose: false
  swagger:
    expose: false
  jaeger:
    expose: false
  rateLimit:
    average: 100
    burst: 50
  cors:
    allowOrigins:
      - "*"
    allowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowHeaders:
      - Content-Type
      - Authorization

networkPolicies:
  # Per-service ingress allow lists (Phase B4 trust boundaries). Disable for kind/minikube if CNI lacks support.
  enabled: true

observability:
  prometheus:
    enabled: true
    retention: 15d
    storageSize: 5Gi
  exporters:
    enabled: true
    postgres:
      enabled: true
    mongodb:
      enabled: true
  alertmanager:
    enabled: true
    slack:
      enabled: false
      channel: "#alerts-production"
      webhookUrl: ""
  grafana:
    enabled: true
  loki:
    enabled: true
  promtail:
    enabled: true
  jaeger:
    enabled: false  # bật khi cần tracing (TRACING_ENABLED=true trong services)

# --- Grafana sub-chart config ---
grafana:
  fullnameOverride: grafana
  adminPassword: "change-me-via-prod-secret"
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          url: http://prometheus:9090
          isDefault: true
          jsonData:
            timeInterval: 15s
        - name: Loki
          type: loki
          uid: loki
          url: http://loki:3100
          jsonData:
            maxLines: 1000
  dashboardsConfigMaps:
    default: collabspace-grafana-dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: CollabSpace
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  # root_url set via env in values-prod when gateway.publicHost is set.
  grafana.ini:
    server:
      serve_from_sub_path: true

# --- Loki sub-chart config (single binary, filesystem storage) ---
loki:
  fullnameOverride: loki
  deploymentMode: SingleBinary
  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    auth_enabled: false
  singleBinary:
    replicas: 1
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [kafka, mongo]
              topologyKey: kubernetes.io/hostname
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 250m
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false

# --- Promtail sub-chart config ---
promtail:
  fullnameOverride: promtail
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
    snippets:
      # Default chart job tails /var/log/pods; keep only CollabSpace namespace.
      extraRelabelConfigs:
        - source_labels: [__meta_kubernetes_namespace]
          action: keep
          regex: collabspace
      # Avoid 0/1 Ready when many pods churn (k3s single-node); /ready still checks server.
      extraServerConfigs: |
        health_check_target: false
  readinessProbe:
    timeoutSeconds: 10
    periodSeconds: 15
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 128Mi
      cpu: 100m

backup:
  # Enable in values-prod.yaml — off by default to avoid running on local/dev clusters.
  enabled: false
  postgres:
    schedule: "0 2 * * *"      # daily 02:00 UTC
  mongo:
    schedule: "30 2 * * *"     # daily 02:30 UTC (after postgres)
  retention:
    days: 7                    # delete objects older than this from DO Spaces
  doSpaces:
    endpoint: "https://sgp1.digitaloceanspaces.com"
    bucket: "collabspace-bucket"
    region: "sgp1"
    prefix: "backups"          # object key prefix: backups/postgres/YYYYMMDD/…
    # accessKey / secretKey: set in values-prod.yaml (never commit real values)
    accessKey: ""
    secretKey: ""

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70

pdb:
  enabled: true
  minAvailable: 1

# --- Application microservices ---
apps:
  auth-service:
    enabled: true
    # DOKS 3x4GiB pool can't fit 2 replicas/service across all infra (CPU-bound).
    # Bump back to 2 only after adding nodes. See docs/cloudnativepg-migration.md.
    replicas: 1
    image:
      repository: collabspace/auth-service
      tag: latest
    httpPort: 3000
    grpcPort: 50051
    metricsPath: /api/v1/auth/metrics
    health:
      readyPath: /api/v1/auth/health/ready
      livePath: /api/v1/auth/health/live
      readyTimeoutSeconds: 10
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 250m
    extraEnv:
      GRPC_ENABLED: "true"
      GRPC_URL: "0.0.0.0:50051"
      USER_SERVICE_GRPC_URL: user-service:50052
      USER_SERVICE_GRPC_TIMEOUT_MS: "10000"
      REDIS_HOST: redis-master
      OUTBOX_ENABLED: "true"
      DATABASE_SYNCHRONIZE: "false"
      ALLOW_DEV_OTP_ENDPOINT: "false"
      BREVO_SENDER_EMAIL: no-reply@collabspace.local
      BREVO_SENDER_NAME: CollabSpace
      EMAIL_DELIVERY_TIMEOUT_MS: "15000"
      EMAIL_QUEUE_TIMEOUT_MS: "5000"
      EMAIL_JOB_MAX_ATTEMPTS: "5"
      GRAPHILE_WORKER_ENABLED: "true"
      GRAPHILE_WORKER_CONCURRENCY: "5"
      GRAPHILE_WORKER_POLL_INTERVAL: "2000"
      AUTH_VERIFY_LITE_CACHE_ENABLED: "true"
      AUTH_VERIFY_LITE_CACHE_MAX_TTL_SECONDS: "300"
      OUTBOX_POLL_INTERVAL_MS: "5000"
      OUTBOX_STALE_CLAIM_THRESHOLD_MS: "15000"
      OUTBOX_PUBLISH_TIMEOUT_MS: "30000"
      OUTBOX_BATCH_SIZE: "20"

  user-service:
    enabled: true
    replicas: 1
    image:
      repository: collabspace/user-service
      tag: latest
    httpPort: 3000
    grpcPort: 50052
    metricsPath: /api/v1/users/metrics
    health:
      readyPath: /api/v1/users/health/ready
      livePath: /api/v1/users/health/live
      readyTimeoutSeconds: 10
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 250m
    extraEnv:
      GRPC_ENABLED: "true"
      GRPC_URL: "0.0.0.0:50052"
      AUTH_SERVICE_GRPC_URL: auth-service:50051
      AUTH_SERVICE_HTTP_URL: http://auth-service:3000
      AUTH_SERVICE_HTTP_TIMEOUT_MS: "3000"
      USER_OUTBOX_PUBLISH_MODE: "debezium"
      REDIS_HOST: redis-master
      USER_PROFILE_CACHE_TTL_SECONDS: "300"
      USER_PREFS_CACHE_TTL_SECONDS: "600"
      USER_STATUS_CACHE_TTL_SECONDS: "60"

  workspace-service:
    enabled: true
    replicas: 1
    image:
      repository: collabspace/workspace-service
      tag: latest
    httpPort: 8080
    metricsPath: /api/v1/workspaces/metrics
    health:
      readyPath: /api/v1/workspaces/health/ready
      livePath: /api/v1/workspaces/health/live
      readyFailureThreshold: 5
      preStopSleep: 15
      terminationGracePeriodSeconds: 45
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 300m
    extraEnv:
      AUTH_SERVICE_GRPC_URL: auth-service:50051
      AUTH_SERVICE_URL: http://auth-service:3000
      AUTH_SERVICE_TIMEOUT_MS: "3000"
      WORKSPACE_OUTBOX_ENABLED: "true"
      WORKSPACE_OUTBOX_PUBLISH_MODE: "debezium"
      DATABASE_SYNCHRONIZE: "false"
      WORKSPACE_OUTBOX_POLL_INTERVAL_MS: "2000"
      WORKSPACE_OUTBOX_BATCH_SIZE: "25"
      REDIS_HOST: redis-master
      WORKSPACE_CACHE_TTL_SECONDS: "300"
      WORKSPACE_LIST_CACHE_TTL_SECONDS: "120"

  task-service:
    enabled: true
    replicas: 1
    image:
      repository: collabspace/task-service
      tag: latest
    httpPort: 3000
    metricsPath: /api/v1/tasks/metrics
    health:
      readyPath: /api/v1/tasks/health/ready
      livePath: /api/v1/tasks/health/live
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 250m
    extraEnv:
      KAFKA_CONSUMERS_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "task-service"
      KAFKA_GROUP_ID: "task-service"
      TASK_OUTBOX_PUBLISH_MODE: "debezium"
      WORKSPACE_CLIENT_MODE: http
      WORKSPACE_SERVICE_URL: http://workspace-service:8080
      WORKSPACE_SERVICE_TIMEOUT_MS: "10000"
      REDIS_HOST: redis-master
      WORKSPACE_MEMBERSHIP_CACHE_ENABLED: "true"
      WORKSPACE_MEMBERSHIP_CACHE_TTL_SECONDS: "60"
      WORKSPACE_MEMBERSHIP_NEGATIVE_CACHE_TTL_SECONDS: "15"
      TASK_OUTBOX_ENABLED: "true"
      TASK_OUTBOX_POLL_INTERVAL_MS: "2000"
      USER_SERVICE_URL: http://user-service:3000
      USER_SERVICE_TIMEOUT_MS: "3000"
      USER_REPLICA_FALLBACK_ENABLED: "true"
      KAFKA_DLQ_TOPIC: "collabspace.dlq.events"
      KAFKA_CONSUMER_MAX_RETRIES: "3"
      KAFKA_CONSUMER_RETRY_DELAY_MS: "1000"

  notification-service:
    enabled: true
    replicas: 1
    image:
      repository: collabspace/notification-service
      tag: latest
    httpPort: 3000
    metricsPath: /api/v1/notifications/metrics
    health:
      readyPath: /api/v1/notifications/health/ready
      livePath: /api/v1/notifications/health/live
      preStopSleep: 5
      terminationGracePeriodSeconds: 20
    headlessService: true
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 250m
    extraEnv:
      KAFKA_CONSUMERS_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "notification-service"
      KAFKA_GROUP_ID: "notification-service"
      REDIS_HOST: redis-master
      NOTIFICATION_UNREAD_CACHE_TTL_SECONDS: "30"
      WS_ENABLED: "false"
      WS_PATH: /notifications/ws
      USER_SERVICE_URL: http://user-service:3000
      KAFKA_DLQ_TOPIC: "collabspace.dlq.events"
      KAFKA_CONSUMER_MAX_RETRIES: "3"
      KAFKA_CONSUMER_RETRY_DELAY_MS: "1000"

  dlq-service:
    enabled: true
    replicas: 1
    image:
      repository: collabspace/dlq-service
      tag: latest
    httpPort: 3000
    metricsPath: /api/v1/dlq/metrics
    health:
      readyPath: /api/v1/dlq/health/ready
      livePath: /api/v1/dlq/health/live
      preStopSleep: 5
      terminationGracePeriodSeconds: 30
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 250m
    extraEnv:
      KAFKA_CONSUMERS_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "dlq-service"
      KAFKA_GROUP_ID: "dlq-service"
      KAFKA_DLQ_TOPIC: "collabspace.dlq.events"
      DLQ_AUTO_RETRY_ENABLED: "true"
      DLQ_AUTO_RETRY_BATCH_SIZE: "50"
      DLQ_MAX_RETRIES_TRANSIENT: "3"
      DLQ_MAX_RETRIES_UNKNOWN: "1"

  analytics-service:
    enabled: true
    replicas: 1
    image:
      repository: collabspace/analytics-service
      tag: latest
    httpPort: 3000
    metricsPath: /api/v1/analytics/metrics
    health:
      readyPath: /api/v1/analytics/health/ready
      livePath: /api/v1/analytics/health/live
      preStopSleep: 5
      terminationGracePeriodSeconds: 20
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 250m
    extraEnv:
      KAFKA_CONSUMERS_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "analytics-service"
      KAFKA_GROUP_ID: "analytics-service"
      KAFKA_DLQ_TOPIC: "collabspace.dlq.events"
      KAFKA_CONSUMER_MAX_RETRIES: "3"
      KAFKA_CONSUMER_RETRY_DELAY_MS: "1000"
      KAFKA_TOPIC_USER_REGISTERED: "collabspace.user.registered"
      KAFKA_TOPIC_WORKSPACE_CREATED: "collabspace.workspace.workspace_created"
      KAFKA_TOPIC_WORKSPACE_PROJECT_CREATED: "collabspace.workspace.project_created"
      KAFKA_TOPIC_WORKSPACE_MEMBER_JOINED: "collabspace.workspace.member_joined"
      KAFKA_TOPIC_WORKSPACE_MEMBER_LEFT: "collabspace.workspace.member_left"
      KAFKA_TOPIC_TASK_CREATED: "collabspace.task.task_created"
      KAFKA_TOPIC_TASK_STATUS_CHANGED: "collabspace.task.task_status_changed"
      KAFKA_TOPIC_TASK_DELETED: "collabspace.task.task_deleted"
      AUTH_SERVICE_GRPC_URL: auth-service:50051
      AUTH_SERVICE_GRPC_TIMEOUT_MS: "3000"
