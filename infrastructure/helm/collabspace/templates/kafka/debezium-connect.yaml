{{- if .Values.debeziumConnect.enabled }}
{{- $ns := include "collabspace.namespace" . }}
{{- $dc := .Values.debeziumConnect }}
---
apiVersion: v1
kind: Service
metadata:
  name: debezium-connect
  namespace: {{ $ns }}
  labels:
    app: debezium-connect
    app.kubernetes.io/component: debezium-connect
    app.kubernetes.io/part-of: collabspace
spec:
  selector:
    app: debezium-connect
  ports:
    - name: rest
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-connect
  namespace: {{ $ns }}
  labels:
    app: debezium-connect
    app.kubernetes.io/component: debezium-connect
    app.kubernetes.io/part-of: collabspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debezium-connect
  template:
    metadata:
      labels:
        app: debezium-connect
        app.kubernetes.io/component: debezium-connect
        app.kubernetes.io/part-of: collabspace
    spec:
      containers:
        - name: connect
          image: {{ printf "%s:%s" $dc.image.repository $dc.image.tag }}
          imagePullPolicy: {{ $dc.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8083
              name: rest
          env:
            - name: BOOTSTRAP_SERVERS
              value: {{ $dc.bootstrapServers | default "kafka:9092" | quote }}
            - name: GROUP_ID
              value: {{ $dc.groupId | default "collabspace-connect" | quote }}
            - name: CONFIG_STORAGE_TOPIC
              value: {{ $dc.configStorageTopic | default "collabspace_connect_configs" | quote }}
            - name: OFFSET_STORAGE_TOPIC
              value: {{ $dc.offsetStorageTopic | default "collabspace_connect_offsets" | quote }}
            - name: STATUS_STORAGE_TOPIC
              value: {{ $dc.statusStorageTopic | default "collabspace_connect_statuses" | quote }}
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_HEAP_OPTS
              value: {{ $dc.heapOpts | default "-Xmx384m -Xms256m" | quote }}
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
          readinessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml $dc.resources | nindent 12 }}
          volumeMounts:
            - name: connectors
              mountPath: /connectors
            - name: scripts
              mountPath: /scripts
        - name: connector-watcher
          image: alpine:3.20
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache curl jq >/dev/null 2>&1
              CONNECT_URL="${DEBEZIUM_CONNECT_URL:-http://localhost:8083}"

              # Wait until Connect REST API is ready
              echo "[watcher] Waiting for Debezium Connect..."
              until curl -sf "$CONNECT_URL/connectors" >/dev/null 2>&1; do sleep 5; done
              echo "[watcher] Connect ready — registering connectors..."
              /scripts/register-connectors.sh

              # Poll every 60s; restart any FAILED connector tasks
              while true; do
                sleep 60
                for name in $(curl -sf "$CONNECT_URL/connectors" | jq -r '.[]' 2>/dev/null); do
                  state=$(curl -sf "$CONNECT_URL/connectors/$name/status" \
                    | jq -r '.tasks[0].state // "UNKNOWN"' 2>/dev/null)
                  if [ "$state" = "FAILED" ]; then
                    echo "[watcher] Task FAILED for $name — restarting..."
                    curl -sf -X POST "$CONNECT_URL/connectors/$name/tasks/0/restart" >/dev/null || true
                  fi
                done
              done
          env:
            - name: DEBEZIUM_CONNECT_URL
              value: http://localhost:8083
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: connectors
              mountPath: /connectors
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: connectors
          configMap:
            name: debezium-connectors
            items:
              - key: workspace-outbox.json
                path: workspace-outbox.json
              - key: user-outbox.json
                path: user-outbox.json
              - key: task-outbox.json
                path: task-outbox.json
        - name: scripts
          configMap:
            name: debezium-connectors
            defaultMode: 0755
            items:
              - key: register-connectors.sh
                path: register-connectors.sh
{{- end }}
