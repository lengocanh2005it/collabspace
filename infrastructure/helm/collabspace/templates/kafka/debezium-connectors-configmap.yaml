{{- if and .Values.debeziumConnect.enabled .Values.debeziumConnect.connectors.enabled }}
{{- $ns := include "collabspace.namespace" . }}
{{- $pgPass := include "collabspace.postgresPassword" (dict "root" .) }}
{{- $mongoUri := include "collabspace.mongoConnectionString" (dict "root" .) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-connectors
  namespace: {{ $ns }}
  labels:
    app: debezium-connect
data:
  workspace-outbox.json: |
    {
      "name": "collabspace-workspace-outbox",
      "config": {
        "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
        "tasks.max": "1",
        "database.hostname": {{ include "collabspace.postgresql.host" (dict "root" .) | quote }},
        "database.port": "5432",
        "database.user": "postgres",
        "database.password": {{ $pgPass | quote }},
        "database.dbname": "collabspace_workspace",
        "topic.prefix": "collabspace.workspace.db",
        "table.include.list": "public.workspace_outbox_events",
        "plugin.name": "pgoutput",
        "slot.name": "collabspace_workspace_outbox",
        "publication.name": "collabspace_workspace_outbox_pub",
        "publication.autocreate.mode": "filtered",
        "schema.history.internal.kafka.bootstrap.servers": "kafka:9092",
        "schema.history.internal.kafka.topic": "schema-changes.collabspace.workspace",
        "transforms": "outbox",
        "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
        "transforms.outbox.route.by.field": "event_type",
        "transforms.outbox.route.topic.replacement": "collabspace.${routedByValue}",
        "transforms.outbox.table.field.event.id": "id",
        "transforms.outbox.table.field.event.key": "aggregate_id",
        "transforms.outbox.table.field.event.type": "event_type",
        "transforms.outbox.table.field.event.payload": "payload",
        "transforms.outbox.table.expand.json.payload": "true",
        "key.converter": "org.apache.kafka.connect.json.JsonConverter",
        "value.converter": "org.apache.kafka.connect.json.JsonConverter",
        "key.converter.schemas.enable": "false",
        "value.converter.schemas.enable": "false"
      }
    }
  user-outbox.json: |
    {
      "name": "collabspace-user-outbox",
      "config": {
        "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
        "tasks.max": "1",
        "database.hostname": {{ include "collabspace.postgresql.host" (dict "root" .) | quote }},
        "database.port": "5432",
        "database.user": "postgres",
        "database.password": {{ $pgPass | quote }},
        "database.dbname": "collabspace_user",
        "topic.prefix": "collabspace.user.db",
        "table.include.list": "public.user_outbox_events",
        "plugin.name": "pgoutput",
        "slot.name": "collabspace_user_outbox",
        "publication.name": "collabspace_user_outbox_pub",
        "publication.autocreate.mode": "filtered",
        "schema.history.internal.kafka.bootstrap.servers": "kafka:9092",
        "schema.history.internal.kafka.topic": "schema-changes.collabspace.user",
        "transforms": "outbox",
        "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
        "transforms.outbox.route.by.field": "event_type",
        "transforms.outbox.route.topic.replacement": "collabspace.${routedByValue}",
        "transforms.outbox.table.field.event.id": "id",
        "transforms.outbox.table.field.event.key": "aggregate_id",
        "transforms.outbox.table.field.event.type": "event_type",
        "transforms.outbox.table.field.event.payload": "payload",
        "transforms.outbox.table.expand.json.payload": "true",
        "key.converter": "org.apache.kafka.connect.json.JsonConverter",
        "value.converter": "org.apache.kafka.connect.json.JsonConverter",
        "key.converter.schemas.enable": "false",
        "value.converter.schemas.enable": "false"
      }
    }
  task-outbox.json: |
    {
      "name": "collabspace-task-outbox",
      "config": {
        "connector.class": "io.debezium.connector.mongodb.MongoDbConnector",
        "tasks.max": "1",
        "mongodb.connection.string": {{ $mongoUri | quote }},
        "topic.prefix": "collabspace.task.db",
        "database.include.list": "collabspace_task",
        "collection.include.list": "collabspace_task.task_outbox_events",
        "capture.mode": "change_streams_update_full",
        "transforms": "outbox",
        "transforms.outbox.type": "io.debezium.connector.mongodb.transforms.outbox.MongoEventRouter",
        "transforms.outbox.route.by.field": "eventType",
        "transforms.outbox.route.topic.replacement": "collabspace.${routedByValue}",
        "transforms.outbox.collection.field.event.key": "aggregateId",
        "transforms.outbox.collection.field.event.payload": "payload",
        "key.converter": "org.apache.kafka.connect.json.JsonConverter",
        "value.converter": "org.apache.kafka.connect.json.JsonConverter",
        "key.converter.schemas.enable": "false",
        "value.converter.schemas.enable": "false"
      }
    }
  register-connectors.sh: |
    #!/bin/sh
    set -eu
    CONNECT_URL="${DEBEZIUM_CONNECT_URL:-http://debezium-connect:8083}"
    for file in /connectors/*.json; do
      name="$(basename "$file" .json)"
      connector_name="$(jq -r .name "$file")"
      echo "==> Registering $connector_name from $file"
      if curl -sf "$CONNECT_URL/connectors/$connector_name" >/dev/null 2>&1; then
        jq -c .config "$file" | curl -sf -X PUT \
          -H "Content-Type: application/json" \
          --data-binary @- \
          "$CONNECT_URL/connectors/$connector_name/config" >/dev/null
        echo "Updated $connector_name"
      else
        jq -c '{name:.name, config:.config}' "$file" | curl -sf -X POST \
          -H "Content-Type: application/json" \
          --data-binary @- \
          "$CONNECT_URL/connectors" >/dev/null
        echo "Created $connector_name"
      fi
      curl -sf "$CONNECT_URL/connectors/$connector_name/status" | jq -c '{connector:.connector.state, task:(.tasks[0].state // "none")}'
    done
    echo "All connectors registered."
{{- end }}
