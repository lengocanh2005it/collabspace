{{- if .Values.gateway.enabled }}
{{- $ns := include "collabspace.namespace" . }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: collabspace-routes
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: collabspace
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: PathPrefix(`/api/v1/workspaces/internal`) || PathPrefix(`/api/v1/users/internal`)
      kind: Rule
      priority: 200
      services:
        - name: internal-api-reject
          port: 80
    - match: PathPrefix(`/api/v1/users/health`)
      kind: Rule
      priority: 150
      services:
        - name: user-service
          port: 3000
      middlewares:
        - name: rate-limit
        - name: cors-headers
    - match: PathPrefix(`/api/v1/workspaces/health`)
      kind: Rule
      priority: 150
      services:
        - name: workspace-service
          port: 8080
      middlewares:
        - name: rate-limit
        - name: cors-headers
    - match: PathPrefix(`/api/v1/tasks/health`)
      kind: Rule
      priority: 150
      services:
        - name: task-service
          port: 3000
      middlewares:
        - name: rate-limit
        - name: cors-headers
    - match: PathPrefix(`/api/v1/notifications/health`)
      kind: Rule
      priority: 150
      services:
        - name: notification-service
          port: 3000
      middlewares:
        - name: rate-limit
        - name: cors-headers
    - match: Path(`/api/v1/auth/me`)
      kind: Rule
      priority: 100
      services:
        - name: auth-service
          port: 3000
      middlewares:
        - name: cors-headers
        - name: strip-identity-headers
        - name: forward-auth
        - name: rate-limit
    - match: PathPrefix(`/api/v1/auth`)
      kind: Rule
      services:
        - name: auth-service
          port: 3000
      middlewares:
        - name: rate-limit
        - name: cors-headers
    - match: PathPrefix(`/api/v1/users`)
      kind: Rule
      services:
        - name: user-service
          port: 3000
      middlewares:
        - name: cors-headers
        - name: strip-identity-headers
        - name: forward-auth
        - name: rate-limit
    - match: PathPrefix(`/api/v1/invitations`)
      kind: Rule
      services:
        - name: workspace-service
          port: 8080
      middlewares:
        - name: cors-headers
        - name: strip-identity-headers
        - name: forward-auth
        - name: rate-limit
    - match: PathPrefix(`/api/v1/workspaces`)
      kind: Rule
      services:
        - name: workspace-service
          port: 8080
      middlewares:
        - name: cors-headers
        - name: strip-identity-headers
        - name: forward-auth
        - name: rate-limit
    - match: PathPrefix(`/api/v1/tasks`)
      kind: Rule
      services:
        - name: task-service
          port: 3000
      middlewares:
        - name: cors-headers
        - name: strip-identity-headers
        - name: forward-auth
        - name: rate-limit
    - match: PathPrefix(`/api/v1/notifications`)
      kind: Rule
      services:
        - name: notification-service
          port: 3000
      middlewares:
        - name: cors-headers
        - name: strip-identity-headers
        - name: forward-auth
        - name: rate-limit
  {{- if and .Values.gateway.tls .Values.gateway.tls.enabled }}
  tls:
    certResolver: {{ .Values.gateway.tls.certResolver | default "letsencrypt" }}
    {{- if .Values.gateway.publicHost }}
    domains:
      - main: {{ .Values.gateway.publicHost }}
        {{- if .Values.gateway.tls.sans }}
        sans:
          {{- range .Values.gateway.tls.sans }}
          - {{ . }}
          {{- end }}
        {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
