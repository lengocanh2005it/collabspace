{{- if .Values.networkPolicies.enabled }}
{{- $ns := include "collabspace.namespace" . }}
{{- $appServices := list "auth-service" "user-service" "workspace-service" "task-service" "notification-service" "dlq-service" "analytics-service" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ $ns }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-services
  namespace: {{ $ns }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: {{ toJson $appServices }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service-ingress
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [user-service, workspace-service, task-service, notification-service, dlq-service, analytics-service]
      ports:
        - port: 50051
          protocol: TCP
    # workspace-service calls GET /api/v1/auth/me; user-service calls GET /api/v1/auth/admin/users
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [workspace-service, user-service]
      ports:
        - port: 3000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-service-ingress
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: user-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - port: 50052
          protocol: TCP
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [task-service, notification-service, dlq-service]
      ports:
        - port: 3000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-workspace-service-ingress
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: workspace-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: task-service
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-task-service-ingress
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: task-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-notification-service-ingress
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-clients
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      {{- if .Values.cloudnativepg.enabled }}
      cnpg.io/cluster: {{ .Values.cloudnativepg.clusterName | default "postgres" }}
      {{- else }}
      app.kubernetes.io/name: postgresql
      {{- end }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth-service, user-service, workspace-service, postgres-exporter, backup-postgres]
        - podSelector:
            matchLabels:
              app: debezium-connect
        - podSelector:
            matchExpressions:
              - key: collabspace.dev/migration
                operator: Exists
        - podSelector:
            matchExpressions:
              - key: collabspace.dev/seed
                operator: Exists
      ports:
        - port: 5432
          protocol: TCP
    {{- if .Values.cloudnativepg.enabled }}
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.cloudnativepg.clusterName | default "postgres" }}
      ports:
        - port: 5432
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mongo-clients
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mongodb
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [task-service, notification-service, dlq-service, analytics-service, backup-mongo]
        - podSelector:
            matchLabels:
              app: debezium-connect
      ports:
        - port: 27017
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-clients
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth-service, user-service, workspace-service, task-service, notification-service, redis-exporter]
      ports:
        - port: 6379
          protocol: TCP
        - port: 26379
          protocol: TCP
---
{{- if .Values.kafka.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-clients
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [task-service, notification-service, dlq-service, analytics-service]
        - podSelector:
            matchLabels:
              app: debezium-connect
        - podSelector:
            matchLabels:
              app: kafka-exporter
      ports:
        - port: 9092
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-debezium-connect-rest
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: debezium-connect
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: register-debezium-connectors
      ports:
        - port: 8083
          protocol: TCP
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: {{ $ns }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 3000
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 15692
          protocol: TCP
        - port: 9121
          protocol: TCP
        - port: 9187
          protocol: TCP
        - port: 9216
          protocol: TCP
        - port: 9093
          protocol: TCP
        - port: 8080
          protocol: TCP
{{- if and .Values.observability.grafana.enabled .Values.gateway.grafana.expose }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-grafana
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP
{{- end }}
{{- if and .Values.observability.jaeger.enabled .Values.gateway.jaeger.expose }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-jaeger
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: jaeger
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 16686
          protocol: TCP
{{- end }}
{{- if .Values.observability.loki.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loki-clients
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: promtail
      ports:
        - port: 3100
          protocol: TCP
{{- end }}
{{- if .Values.observability.grafana.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-to-prometheus
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - port: 9090
          protocol: TCP
{{- end }}
{{- if .Values.observability.jaeger.enabled }}
---
# Allow Traefik to reach Jaeger UI (port 16686) for the /jaeger IngressRoute
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-jaeger-ui
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: jaeger
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 16686
          protocol: TCP
---
# Allow all microservices to push OTLP traces to Jaeger (port 4318)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-jaeger-otlp
  namespace: {{ $ns }}
spec:
  podSelector:
    matchLabels:
      app: jaeger
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: {{ toJson $appServices }}
      ports:
        - port: 4318
          protocol: TCP
        - port: 4317
          protocol: TCP
{{- end }}
{{- end }}
