{{- if .Values.observability.prometheus.enabled }}
{{- $ns := include "collabspace.namespace" . }}
{{- $metricsAuthToken := .Values.global.secrets.metricsAuthToken | default "" | trim }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: {{ $ns }}
  labels:
    app: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-{{ $ns }}
  labels:
    app: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-{{ $ns }}
  labels:
    app: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-{{ $ns }}
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: {{ $ns }}
{{- if $metricsAuthToken }}
---
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-metrics-auth
  namespace: {{ $ns }}
  labels:
    app: prometheus
type: Opaque
stringData:
  metrics_auth_token: {{ $metricsAuthToken | quote }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ $ns }}
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        environment: production
        project: collabspace
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      {{- range $name, $app := .Values.apps }}
      {{- if $app.enabled }}
      - job_name: {{ $name }}
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [{{ $ns }}]
        {{- if $metricsAuthToken }}
        authorization:
          credentials_file: /etc/prometheus/secrets/metrics_auth_token
        {{- end }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: {{ $name }}
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
      {{- end }}
      {{- end }}
      {{- if .Values.traefik.enabled }}
      - job_name: traefik
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [{{ $ns }}]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            regex: '^traefik.*'
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
      {{- end }}
      - job_name: redis-exporter
        static_configs:
          - targets: ['redis-exporter:9121']
      {{- if .Values.observability.exporters.postgres.enabled }}
      - job_name: postgres-exporter
        static_configs:
          - targets: ['postgres-exporter:9187']
      {{- end }}
      {{- if .Values.observability.exporters.mongodb.enabled }}
      - job_name: mongodb-exporter
        static_configs:
          - targets: ['mongodb-exporter:9216']
      {{- end }}
      {{- $_kafka := index .Values "kafka" | default dict }}
      {{- $_kafkaExp := index $_kafka "exporter" | default dict }}
      {{- if and (index $_kafka "enabled") (index $_kafkaExp "enabled") }}
      - job_name: kafka-exporter
        static_configs:
          - targets: ['kafka-exporter:9308']
      {{- end }}
      {{- if .Values.observability.alertmanager.enabled }}
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ $ns }}
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        checksum/config: {{ printf "%s|%s" (toJson .Values.observability) $metricsAuthToken | sha256sum }}
    spec:
      serviceAccountName: prometheus
      automountServiceAccountToken: true
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retention }}
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
            {{- if $metricsAuthToken }}
            - name: metrics-auth
              mountPath: /etc/prometheus/secrets
              readOnly: true
            {{- end }}
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
        {{- if $metricsAuthToken }}
        - name: metrics-auth
          secret:
            secretName: prometheus-metrics-auth
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ $ns }}
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http
{{- end }}
