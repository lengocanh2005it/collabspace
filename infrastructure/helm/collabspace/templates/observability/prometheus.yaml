{{- if .Values.observability.prometheus.enabled }}
{{- $ns := include "collabspace.namespace" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ $ns }}
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        environment: production
        project: collabspace
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
      {{- range $name, $app := .Values.apps }}
      {{- if $app.enabled }}
      - job_name: {{ $name }}
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [{{ $ns }}]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: {{ $name }}
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
      {{- end }}
      {{- end }}
      - job_name: rabbitmq
        static_configs:
          - targets: ['rabbitmq:15692']
      - job_name: redis-exporter
        static_configs:
          - targets: ['redis-exporter:9121']
      {{- if .Values.observability.exporters.postgres.enabled }}
      - job_name: postgres-exporter
        static_configs:
          - targets: ['postgres-exporter:9187']
      {{- end }}
      {{- if .Values.observability.exporters.mongodb.enabled }}
      - job_name: mongodb-exporter
        static_configs:
          - targets: ['mongodb-exporter:9216']
      {{- end }}
      {{- if .Values.observability.alertmanager.enabled }}
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ $ns }}
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: default
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retention }}
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ $ns }}
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http
{{- end }}
