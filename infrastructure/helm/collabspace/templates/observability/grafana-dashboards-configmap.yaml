{{- if .Values.observability.grafana.enabled }}
{{- $ns := include "collabspace.namespace" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collabspace-grafana-dashboards
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: collabspace
data:
  service-health.json: |-
{{ .Files.Get "dashboards/service-health.json" | indent 4 }}
  logs-errors.json: |-
{{ .Files.Get "dashboards/logs-errors.json" | indent 4 }}
  load-test-run.json: |-
{{ .Files.Get "dashboards/load-test-run.json" | indent 4 }}
  dlq-service.json: |-
{{ .Files.Get "dashboards/dlq-service.json" | indent 4 }}
{{- end }}
