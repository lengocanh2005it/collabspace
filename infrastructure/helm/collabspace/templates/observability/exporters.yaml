{{- if .Values.observability.exporters.enabled }}
{{- $ns := include "collabspace.namespace" . }}
{{- $redisPass := include "collabspace.redisPassword" (dict "root" .) }}
{{- $pgPass := include "collabspace.postgresPassword" (dict "root" .) }}
{{- $mongoPass := include "collabspace.mongoPassword" (dict "root" .) }}
{{- $mongoUser := include "collabspace.mongoUsername" (dict "root" .) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: {{ $ns }}
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.66.0
          env:
            - name: REDIS_ADDR
              value: {{ printf "redis://:%s@%s:6379" $redisPass (include "collabspace.redis.host" (dict "root" .)) | quote }}
          ports:
            - containerPort: 9121
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: {{ $ns }}
  labels:
    app: redis-exporter
spec:
  selector:
    app: redis-exporter
  ports:
    - port: 9121
      targetPort: 9121
{{- if .Values.observability.exporters.postgres.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: {{ $ns }}
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          env:
            - name: DATA_SOURCE_NAME
              value: {{ printf "postgresql://postgres:%s@%s:5432/postgres?sslmode=disable" $pgPass (include "collabspace.postgresql.host" (dict "root" .)) | quote }}
          ports:
            - containerPort: 9187
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 64Mi
              cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: {{ $ns }}
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
{{- end }}
{{- if .Values.observability.exporters.mongodb.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-exporter
  namespace: {{ $ns }}
  labels:
    app: mongodb-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-exporter
  template:
    metadata:
      labels:
        app: mongodb-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9216"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: mongodb-exporter
          image: percona/mongodb_exporter:0.40
          args:
            - --collect-all
            - --compatible-mode
          env:
            - name: MONGODB_URI
              value: {{ printf "mongodb://%s:%s@%s:27017/admin" $mongoUser $mongoPass (include "collabspace.mongodb.host" (dict "root" .)) | quote }}
          ports:
            - containerPort: 9216
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 64Mi
              cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-exporter
  namespace: {{ $ns }}
  labels:
    app: mongodb-exporter
spec:
  selector:
    app: mongodb-exporter
  ports:
    - port: 9216
      targetPort: 9216
{{- end }}
{{- end }}
