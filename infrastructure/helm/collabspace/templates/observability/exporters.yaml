{{- if .Values.observability.exporters.enabled }}
{{- $ns := include "collabspace.namespace" . }}
{{- $redisPass := include "collabspace.redisPassword" (dict "root" .) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: {{ $ns }}
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.66.0
          env:
            - name: REDIS_ADDR
              value: {{ printf "redis://:%s@redis:6379" $redisPass | quote }}
          ports:
            - containerPort: 9121
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: {{ $ns }}
  labels:
    app: redis-exporter
spec:
  selector:
    app: redis-exporter
  ports:
    - port: 9121
      targetPort: 9121
{{- end }}
