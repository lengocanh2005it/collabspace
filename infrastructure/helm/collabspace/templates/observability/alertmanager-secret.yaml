{{- if and .Values.observability.alertmanager.enabled .Values.observability.alertmanager.slack.enabled }}
{{- if not .Values.global.externalSecrets.enabled }}
# Rendered only when externalSecrets.enabled=false (local / no-ESO envs).
# In prod (ESO enabled): create via Vault KV slack_alert_webhook_url + ExternalSecret.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: alertmanager
    app.kubernetes.io/part-of: collabspace
type: Opaque
stringData:
  slackWebhookUrl: {{ .Values.observability.alertmanager.slack.webhookUrl | required "observability.alertmanager.slack.webhookUrl required when slack.enabled and externalSecrets disabled" | quote }}
{{- end }}
{{- end }}
