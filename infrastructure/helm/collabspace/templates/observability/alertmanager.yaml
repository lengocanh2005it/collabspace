{{- if .Values.observability.alertmanager.enabled }}
{{- $ns := include "collabspace.namespace" . }}
{{- $slack := .Values.observability.alertmanager.slack }}
{{- $channel := $slack.channel | default "#alerts-production" }}
{{- if not $slack.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: {{ $ns }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
    receivers:
      - name: 'null'
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: {{ $ns }}
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          {{- if $slack.enabled }}
          command:
            - /bin/sh
            - -ec
            - |
              cat > /tmp/alertmanager.yml <<'AMCFG'
              global:
                resolve_timeout: 5m
                slack_api_url: 'SLACK_WEBHOOK_PLACEHOLDER'
              route:
                receiver: default-slack
                group_by: ['alertname', 'job']
                group_wait: 10s
                group_interval: 5m
                repeat_interval: 4h
                routes:
                  - match:
                      severity: critical
                    receiver: default-slack
              receivers:
                - name: default-slack
                  slack_configs:
                    - channel: '{{ $channel }}'
                      send_resolved: true
                      title: '[{{ "{{" }} .Status | toUpper {{ "}}" }}{{ "{{" }} if eq .Status "firing" {{ "}}" }}:{{ "{{" }} .Alerts.Firing | len {{ "}}" }}{{ "{{" }} end {{ "}}" }}] {{ "{{" }} .GroupLabels.SortedPairs.Values | join " " {{ "}}" }}'
                      text: |
                        {{ "{{" }} range .Alerts {{ "}}" }}
                        *Alert:* {{ "{{" }} .Annotations.summary {{ "}}" }}{{ "{{" }} if .Labels.severity {{ "}}" }} - `{{ "{{" }} .Labels.severity {{ "}}" }}`{{ "{{" }} end {{ "}}" }}
                        *Description:* {{ "{{" }} .Annotations.description {{ "}}" }}

                        {{ "{{" }} end {{ "}}" }}
              inhibit_rules:
                - source_match:
                    severity: 'critical'
                  target_match:
                    severity: 'warning'
                  equal: ['alertname', 'namespace']
              AMCFG
              sed -i "s|SLACK_WEBHOOK_PLACEHOLDER|${SLACK_WEBHOOK_URL}|g" /tmp/alertmanager.yml
              exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-slack-secret
                  key: slackWebhookUrl
          {{- else }}
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          {{- end }}
          ports:
            - containerPort: 9093
          volumeMounts:
            {{- if not $slack.enabled }}
            - name: config
              mountPath: /etc/alertmanager
            {{- end }}
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 64Mi
              cpu: 100m
      volumes:
        {{- if not $slack.enabled }}
        - name: config
          configMap:
            name: alertmanager-config
        {{- end }}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: {{ $ns }}
  labels:
    app: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
      name: http
{{- end }}
