{{- if .Values.backup.enabled }}
{{- if not .Values.global.externalSecrets.enabled }}
# Rendered only when externalSecrets.enabled=false (local / no-ESO envs).
# In prod (ESO enabled): create via Vault KV path secret/collabspace/prod keys:
#   do_spaces_key, do_spaces_secret, postgres_password, mongo_password
# and add an ExternalSecret targeting secret/backup-spaces-secret.
apiVersion: v1
kind: Secret
metadata:
  name: backup-spaces-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: collabspace
type: Opaque
stringData:
  doSpacesKey: {{ .Values.backup.doSpaces.accessKey | required "backup.doSpaces.accessKey required" | quote }}
  doSpacesSecret: {{ .Values.backup.doSpaces.secretKey | required "backup.doSpaces.secretKey required" | quote }}
  postgresPassword: {{ include "collabspace.postgresPassword" . | quote }}
  mongoPassword: {{ include "collabspace.mongoPassword" . | quote }}
{{- end }}
{{- end }}
