{{- if .Values.hpa.enabled }}
{{- $ns := include "collabspace.namespace" . -}}
{{- range $name, $app := .Values.apps }}
{{- if and $app.enabled $app.autoscaling $app.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-hpa
  namespace: {{ $ns }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ default $.Values.hpa.minReplicas $app.autoscaling.minReplicas }}
  maxReplicas: {{ default $.Values.hpa.maxReplicas $app.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ default $.Values.hpa.targetCPUUtilization $app.autoscaling.targetCPUUtilization }}
{{- end }}
{{- end }}
{{- end }}
