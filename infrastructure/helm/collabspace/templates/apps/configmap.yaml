{{- $root := . -}}
{{- $ns := include "collabspace.namespace" . -}}
{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  namespace: {{ $ns }}
  labels:
    {{- include "collabspace.appLabels" (dict "appName" $name "root" $root) | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: {{ $app.httpPort | quote }}
  LOG_LEVEL: "info"
  TRACING_ENABLED: "false"
  SWAGGER_UI_PATH: {{ include "collabspace.swaggerUiPath" (dict "appName" $name "app" $app) | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318/v1/traces"
  JAEGER_AGENT_HOST: "jaeger"
  {{- if eq $name "auth-service" }}
  DATABASE_URL: {{ include "collabspace.postgresUrl" (dict "database" "collabspace_auth" "root" $root) | quote }}
  DATABASE_SCHEMA: "public"
  DATABASE_SSL: "false"
  DATABASE_SYNCHRONIZE: "false"
  RABBITMQ_URL: {{ include "collabspace.rabbitmqUrl" (dict "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "user-service" }}
  DATABASE_URL: {{ include "collabspace.postgresUrl" (dict "database" "collabspace_user" "root" $root) | quote }}
  DATABASE_SCHEMA: "public"
  DATABASE_SSL: "false"
  DATABASE_SYNCHRONIZE: "false"
  RABBITMQ_URL: {{ include "collabspace.rabbitmqUrl" (dict "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "workspace-service" }}
  DATABASE_URL: {{ include "collabspace.postgresUrl" (dict "database" "collabspace_workspace" "root" $root) | quote }}
  DATABASE_SCHEMA: "public"
  DATABASE_LOGGING: "false"
  RABBITMQ_URL: {{ include "collabspace.rabbitmqUrl" (dict "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "task-service" }}
  MONGO_URI: {{ include "collabspace.mongoUri" (dict "database" "collabspace_task" "root" $root) | quote }}
  RABBITMQ_URL: {{ include "collabspace.rabbitmqUrl" (dict "root" $root) | quote }}
  AZURE_STORAGE_CONTAINER_NAME: {{ $root.Values.global.azureStorage.containerName | default "task-attachments" | quote }}
  AZURE_STORAGE_MAX_FILE_SIZE: {{ $root.Values.global.azureStorage.maxFileSize | default "5242880" | quote }}
  {{- end }}
  {{- if eq $name "notification-service" }}
  MONGO_URI: {{ include "collabspace.mongoUri" (dict "database" "collabspace_notification" "root" $root) | quote }}
  RABBITMQ_URL: {{ include "collabspace.rabbitmqUrl" (dict "root" $root) | quote }}
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  {{- end }}
  {{- if or (eq $name "auth-service") (eq $name "user-service") (eq $name "task-service") (eq $name "notification-service") }}
  RABBITMQ_DLX_EXCHANGE: {{ $root.Values.global.rabbitmq.dlxExchange | default "collabspace_dlx" | quote }}
  RABBITMQ_DLX_ROUTING_KEY: {{ printf "%s.dlq" $name | quote }}
  {{- end }}
  {{- range $key, $val := $app.extraEnv }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
{{- end }}
