{{- $root := . -}}
{{- if not $root.Values.global.externalSecrets.enabled }}
{{- $ns := include "collabspace.namespace" . -}}
{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-secrets
  namespace: {{ $ns }}
  labels:
    {{- include "collabspace.appLabels" (dict "appName" $name "root" $root) | nindent 4 }}
type: Opaque
stringData:
  {{- if or (eq $name "auth-service") (eq $name "notification-service") }}
  JWT_SECRET: {{ include "collabspace.jwtSecret" (dict "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "auth-service" }}
  BREVO_API_KEY: {{ $root.Values.global.secrets.brevoApiKey | quote }}
  {{- end }}
  {{- if or (eq $name "auth-service") (eq $name "user-service") (eq $name "workspace-service") (eq $name "task-service") (eq $name "notification-service") (eq $name "dlq-service") (eq $name "analytics-service") }}
  SERVICE_JWT_SECRET: {{ include "collabspace.serviceJwtSecret" (dict "root" $root) | quote }}
  {{- end }}
  {{- if $root.Values.global.secrets.metricsAuthToken }}
  METRICS_AUTH_TOKEN: {{ $root.Values.global.secrets.metricsAuthToken | quote }}
  {{- end }}
  {{- if or (eq $name "auth-service") (eq $name "user-service") (eq $name "workspace-service") }}
  POSTGRES_PASSWORD: {{ include "collabspace.postgresPassword" (dict "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "auth-service" }}
  DATABASE_URL: {{ include "collabspace.postgresUrl" (dict "database" "collabspace_auth" "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "user-service" }}
  DATABASE_URL: {{ include "collabspace.postgresUrl" (dict "database" "collabspace_user" "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "workspace-service" }}
  DATABASE_URL: {{ include "collabspace.postgresUrl" (dict "database" "collabspace_workspace" "root" $root) | quote }}
  {{- end }}
  {{- if or (eq $name "user-service") (eq $name "task-service") }}
  {{- if $root.Values.global.secrets.azureStorageConnectionString }}
  AZURE_STORAGE_CONNECTION_STRING: {{ $root.Values.global.secrets.azureStorageConnectionString | quote }}
  {{- end }}
  {{- end }}
  {{- if or (eq $name "auth-service") (eq $name "notification-service") (eq $name "user-service") (eq $name "workspace-service") (eq $name "task-service") }}
  REDIS_PASSWORD: {{ include "collabspace.redisPassword" (dict "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "task-service" }}
  MONGO_URI: {{ include "collabspace.mongoUri" (dict "database" "collabspace_task" "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "notification-service" }}
  MONGO_URI: {{ include "collabspace.mongoUri" (dict "database" "collabspace_notification" "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "dlq-service" }}
  MONGO_URI: {{ include "collabspace.mongoUri" (dict "database" "collabspace_dlq" "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "analytics-service" }}
  MONGO_URI: {{ include "collabspace.mongoUri" (dict "database" "collabspace_analytics" "root" $root) | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
