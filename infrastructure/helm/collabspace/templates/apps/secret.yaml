{{- $root := . -}}
{{- if not $root.Values.global.externalSecrets.enabled }}
{{- $ns := include "collabspace.namespace" . -}}
{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-secrets
  namespace: {{ $ns }}
  labels:
    {{- include "collabspace.appLabels" (dict "appName" $name "root" $root) | nindent 4 }}
type: Opaque
stringData:
  {{- if or (eq $name "auth-service") (eq $name "notification-service") }}
  JWT_SECRET: {{ include "collabspace.jwtSecret" (dict "root" $root) | quote }}
  {{- end }}
  {{- if or (eq $name "user-service") (eq $name "workspace-service") (eq $name "task-service") (eq $name "notification-service") }}
  INTERNAL_SERVICE_TOKEN: {{ include "collabspace.internalServiceToken" (dict "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "task-service" }}
  AZURE_STORAGE_CONNECTION_STRING: {{ $root.Values.global.secrets.azureStorageConnectionString | quote }}
  {{- end }}
  {{- if $root.Values.global.secrets.metricsAuthToken }}
  METRICS_AUTH_TOKEN: {{ $root.Values.global.secrets.metricsAuthToken | quote }}
  {{- end }}
  {{- if or (eq $name "auth-service") (eq $name "user-service") (eq $name "workspace-service") }}
  POSTGRES_PASSWORD: {{ include "collabspace.postgresPassword" (dict "root" $root) | quote }}
  {{- end }}
  {{- if or (eq $name "auth-service") (eq $name "task-service") (eq $name "notification-service") (eq $name "workspace-service") }}
  RABBITMQ_USER: {{ include "collabspace.rabbitmqUser" (dict "root" $root) | quote }}
  RABBITMQ_PASSWORD: {{ include "collabspace.rabbitmqPassword" (dict "root" $root) | quote }}
  {{- end }}
  {{- if or (eq $name "auth-service") (eq $name "notification-service") }}
  REDIS_PASSWORD: {{ include "collabspace.redisPassword" (dict "root" $root) | quote }}
  {{- end }}
  {{- if eq $name "auth-service" }}
  {{- if $root.Values.global.secrets.mailUser }}
  MAIL_USER: {{ $root.Values.global.secrets.mailUser | quote }}
  {{- end }}
  {{- if $root.Values.global.secrets.mailPassword }}
  MAIL_PASSWORD: {{ $root.Values.global.secrets.mailPassword | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
