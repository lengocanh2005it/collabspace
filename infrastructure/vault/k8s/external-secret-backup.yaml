# ExternalSecret — backup-spaces-secret
# Syncs DO Spaces credentials + DB passwords từ Vault KV vào K8s Secret
# dùng bởi CronJob backup-postgres và backup-mongo (Helm templates/jobs/backup-cronjob.yaml).
#
# Apply sau khi ESO + VaultAuth đã cài (Phase 2):
#   kubectl apply -f infrastructure/vault/k8s/external-secret-backup.yaml
#
# Vault keys cần có trong secret/collabspace/<env>:
#   do_spaces_key     — DO Spaces Access Key
#   do_spaces_secret  — DO Spaces Secret Key
#   postgres_password — dùng chung với app services
#   mongo_password    — dùng chung với app services
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backup-spaces-secret
  namespace: collabspace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-collabspace
    kind: ClusterSecretStore
  target:
    name: backup-spaces-secret
    creationPolicy: Owner
  data:
    - secretKey: doSpacesKey
      remoteRef:
        key: collabspace/prod
        property: do_spaces_key
    - secretKey: doSpacesSecret
      remoteRef:
        key: collabspace/prod
        property: do_spaces_secret
    - secretKey: postgresPassword
      remoteRef:
        key: collabspace/prod
        property: postgres_password
    - secretKey: mongoPassword
      remoteRef:
        key: collabspace/prod
        property: mongo_password
