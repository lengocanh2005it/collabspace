# External Secrets Operator — Vault backend (KV v2).
#
# Prerequisites:
#   1. Install ESO: https://external-secrets.io/latest/introduction/getting-started/
#   2. Vault reachable from cluster (in-cluster HA or dev single node).
#   3. Create namespace secret with Vault token OR configure Kubernetes auth (see README).
#
# Dev/staging: tokenSecretRef below (create secret manually, never commit token).
# Production: prefer Kubernetes auth + Vault policy per service (README).

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-collabspace
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-eso-token
          namespace: collabspace
          key: token
