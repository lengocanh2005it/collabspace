# ExternalSecret — alertmanager-slack-secret
# Syncs Slack Incoming Webhook URL từ Vault KV cho Alertmanager receiver.
#
# Apply sau khi ESO + VaultAuth đã cài (Phase 2):
#   kubectl apply -f infrastructure/vault/k8s/external-secret-alertmanager.yaml
#
# Vault key trong secret/collabspace/<env>:
#   slack_alert_webhook_url — https://hooks.slack.com/services/...
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-secret
  namespace: collabspace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-collabspace
    kind: ClusterSecretStore
  target:
    name: alertmanager-slack-secret
    creationPolicy: Owner
  data:
    - secretKey: slackWebhookUrl
      remoteRef:
        key: collabspace/prod
        property: slack_alert_webhook_url
