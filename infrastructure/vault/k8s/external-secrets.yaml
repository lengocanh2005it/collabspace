# Sync Vault KV secret/collabspace/dev → Kubernetes Secrets consumed by Helm deployments.
# Secret names must match: {app}-secrets (see infrastructure/helm/collabspace/templates/apps/deployment.yaml)
#
# Apply after ClusterSecretStore and after seeding Vault paths for your environment
# (collabspace/staging, collabspace/prod, …).

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: collabspace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-collabspace
    kind: ClusterSecretStore
  target:
    name: auth-service-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        DATABASE_URL: postgresql://postgres:{{ .POSTGRES_PASSWORD | urlquery }}@postgres-rw:5432/collabspace_auth
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: collabspace/dev
        property: jwt_secret
    - secretKey: SERVICE_JWT_SECRET
      remoteRef:
        key: collabspace/dev
        property: service_jwt_secret
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: collabspace/dev
        property: postgres_password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: collabspace/dev
        property: redis_password
    - secretKey: METRICS_AUTH_TOKEN
      remoteRef:
        key: collabspace/dev
        property: metrics_auth_token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: analytics-service-secrets
  namespace: collabspace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-collabspace
    kind: ClusterSecretStore
  target:
    name: analytics-service-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        MONGO_URI: mongodb://{{ .MONGO_USERNAME | urlquery }}:{{ .MONGO_PASSWORD | urlquery }}@mongo:27017/collabspace_analytics?authSource=admin&replicaSet=rs0
  data:
    - secretKey: MONGO_USERNAME
      remoteRef:
        key: collabspace/dev
        property: mongo_username
    - secretKey: MONGO_PASSWORD
      remoteRef:
        key: collabspace/dev
        property: mongo_password
    - secretKey: SERVICE_JWT_SECRET
      remoteRef:
        key: collabspace/dev
        property: service_jwt_secret
    - secretKey: METRICS_AUTH_TOKEN
      remoteRef:
        key: collabspace/dev
        property: metrics_auth_token
    - secretKey: BREVO_API_KEY
      remoteRef:
        key: collabspace/dev
        property: brevo_api_key
---
