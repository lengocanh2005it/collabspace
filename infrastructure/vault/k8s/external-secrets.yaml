# Sync Vault KV secret/collabspace/dev → Kubernetes Secrets consumed by Helm deployments.
# Secret names must match: {app}-secrets (see infrastructure/helm/collabspace/templates/apps/deployment.yaml)
#
# Apply after ClusterSecretStore and after seeding Vault paths for your environment
# (collabspace/staging, collabspace/prod, …).

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: collabspace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-collabspace
    kind: ClusterSecretStore
  target:
    name: auth-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: collabspace/dev
        property: jwt_secret
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: collabspace/dev
        property: postgres_password
    - secretKey: RABBITMQ_USER
      remoteRef:
        key: collabspace/dev
        property: rabbitmq_username
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: collabspace/dev
        property: rabbitmq_password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: collabspace/dev
        property: redis_password
    - secretKey: METRICS_AUTH_TOKEN
      remoteRef:
        key: collabspace/dev
        property: metrics_auth_token
    - secretKey: MAIL_USER
      remoteRef:
        key: collabspace/dev
        property: mail_user
    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: collabspace/dev
        property: mail_password
---
