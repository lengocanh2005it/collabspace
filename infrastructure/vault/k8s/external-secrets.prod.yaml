# Sync Vault KV secret/collabspace/prod → Kubernetes Secrets (production k3s).
# Apply after ClusterSecretStore + seed Vault path collabspace/prod.
#
# Dev/staging: use external-secrets.yaml (collabspace/dev).

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: collabspace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-collabspace
    kind: ClusterSecretStore
  target:
    name: auth-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: collabspace/prod
        property: jwt_secret
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: collabspace/prod
        property: postgres_password
    - secretKey: RABBITMQ_USER
      remoteRef:
        key: collabspace/prod
        property: rabbitmq_username
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: collabspace/prod
        property: rabbitmq_password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: collabspace/prod
        property: redis_password
    - secretKey: METRICS_AUTH_TOKEN
      remoteRef:
        key: collabspace/prod
        property: metrics_auth_token
---
