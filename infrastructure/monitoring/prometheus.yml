# Prometheus Configuration for CollabSpace
# Agent BRAVO - Infrastructure Engineer: Phan Phu Tho
# Last updated: 2026-04-03

global:
  scrape_interval: 15s      # How often to scrape targets
  evaluation_interval: 15s  # How often to evaluate rules
  
  # Attach these labels to any time series or alert
  external_labels:
    environment: 'development'
    project: 'collabspace'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Rule files for recording rules and alerts
rule_files:
  - '/etc/prometheus/alert-rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  # Traefik API Gateway metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: '/metrics'

  # Auth Service (Node.js - port 3000)
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3000']
    metrics_path: '/api/v1/auth/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # User Service (Node.js - port 3000)
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3000']
    metrics_path: '/api/v1/users/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Workspace Service (NestJS - port 8080 CRITICAL)
  - job_name: 'workspace-service'
    static_configs:
      - targets: ['workspace-service:8080']
    metrics_path: '/api/v1/workspaces/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Task Service (Node.js - port 3000)
  - job_name: 'task-service'
    static_configs:
      - targets: ['task-service:3000']
    metrics_path: '/api/v1/tasks/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Notification Service (Node.js - port 3000)
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3000']
    metrics_path: '/api/v1/notifications/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis metrics (requires redis_exporter sidecar)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # PostgreSQL metrics (requires postgres_exporter sidecar)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # MongoDB metrics (requires mongodb_exporter sidecar)
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']
