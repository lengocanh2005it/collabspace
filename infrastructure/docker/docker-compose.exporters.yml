services:
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://:collabspace123@redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - collabspace-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - collabspace-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.51.0
    container_name: mongodb-exporter
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://admin:password@mongo:27017/admin?authSource=admin&replicaSet=rs0
    ports:
      - "9216:9216"
    depends_on:
      mongo:
        condition: service_healthy
      mongo-rs-init:
        condition: service_completed_successfully
    networks:
      - collabspace-network
