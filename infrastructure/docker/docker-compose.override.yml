services:
  auth-service:
    command: pnpm run start:dev
    volumes:
      - ../../services/auth-service:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  user-service:
    command: pnpm run start:dev
    volumes:
      - ../../services/user-service:/app
      - /app/node_modules
    ports:
      - "3001:3000"
      - "50052:50052"

  workspace-service:
    command: pnpm run start:dev
    volumes:
      - ../../services/workspace-service:/app
      - /app/node_modules
    ports:
      - "3002:8080"

  task-service:
    command: pnpm run start:dev
    volumes:
      - ../../services/task-service:/app
      - /app/node_modules
    ports:
      - "3003:3000"

  notification-service:
    command: pnpm run start:dev
    volumes:
      - ../../services/notification-service:/app
      - /app/node_modules
    ports:
      - "3004:3000"