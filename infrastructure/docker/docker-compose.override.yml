# Local dev overlay: hot-reload services + Prometheus/Grafana (exporters + monitoring).
include:
  - path: docker-compose.exporters.yml
  - path: docker-compose.monitoring.yml

services:
  auth-service:
    image: node:20-alpine
    working_dir: /monorepo
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile --ignore-scripts && cd services/auth-service && pnpm run start:dev"
    volumes:
      - ../../:/monorepo
      - /monorepo/node_modules
      - /monorepo/services/auth-service/node_modules
      - /monorepo/packages/shared/node_modules
    ports:
      - "3000:3000"
      - "50051:50051"
    environment:
      GRPC_ENABLED: "true"

  user-service:
    image: node:20-alpine
    working_dir: /monorepo
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile --ignore-scripts && cd services/user-service && pnpm run start:dev"
    volumes:
      - ../../:/monorepo
      - /monorepo/node_modules
      - /monorepo/services/user-service/node_modules
      - /monorepo/packages/shared/node_modules
    ports:
      - "3001:3000"
      - "50052:50052"

  workspace-service:
    image: node:20-alpine
    working_dir: /monorepo
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile --ignore-scripts && cd services/workspace-service && pnpm run start:dev"
    volumes:
      - ../../:/monorepo
      - /monorepo/node_modules
      - /monorepo/services/workspace-service/node_modules
      - /monorepo/packages/shared/node_modules
    ports:
      - "3002:8080"

  task-service:
    image: node:20-alpine
    working_dir: /monorepo
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile --ignore-scripts && cd services/task-service && pnpm run start:dev"
    volumes:
      - ../../:/monorepo
      - /monorepo/node_modules
      - /monorepo/services/task-service/node_modules
      - /monorepo/packages/shared/node_modules
    ports:
      - "3003:3000"

  notification-service:
    image: node:20-alpine
    working_dir: /monorepo
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile --ignore-scripts && cd services/notification-service && pnpm exec nest build --webpack && node dist/main.js"
    volumes:
      - ../../:/monorepo
      - /monorepo/node_modules
      - /monorepo/services/notification-service/node_modules
      - /monorepo/packages/shared/node_modules
    ports:
      - "3004:3000"

  dlq-service:
    image: node:20-alpine
    working_dir: /monorepo
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile --ignore-scripts && cd services/dlq-service && pnpm run start:dev"
    volumes:
      - ../../:/monorepo
      - /monorepo/node_modules
      - /monorepo/services/dlq-service/node_modules
      - /monorepo/packages/shared/node_modules
      - /monorepo/packages/nest-auth/node_modules
    ports:
      - "3006:3000"

  analytics-service:
    image: node:20-alpine
    working_dir: /monorepo
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile --ignore-scripts && cd services/analytics-service && pnpm run start:dev"
    volumes:
      - ../../:/monorepo
      - /monorepo/node_modules
      - /monorepo/services/analytics-service/node_modules
      - /monorepo/packages/shared/node_modules
      - /monorepo/packages/nest-auth/node_modules
    ports:
      - "3005:3000"
    environment:
      AUTH_SERVICE_GRPC_URL: "auth-service:50051"
