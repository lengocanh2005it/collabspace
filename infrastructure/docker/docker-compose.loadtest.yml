services:
  k6:
    image: loadimpact/k6:latest
    container_name: k6-loadtest
    networks:
      - collabspace-network
    env_file:
      - ../load-testing/k6/.env
    volumes:
      - ../load-testing/k6/scripts:/scripts
    command: >
      sh -c "k6 run /scripts/$K6_SCRIPT --vus $K6_VUS --duration $K6_DURATION"
    depends_on:
      - auth-service
      - user-service
      - workspace-service
      - task-service
      - notification-service

networks:
  collabspace-network:
    external: true