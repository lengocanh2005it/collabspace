services:
  k6:
    image: grafana/k6:latest
    container_name: k6-loadtest
    networks:
      - collabspace-network
    env_file:
      - ../load-testing/k6/.env
    environment:
      - BASE_URL=${BASE_URL:-http://traefik/api/v1}
      - K6_VUS=${K6_VUS:-10}
      - K6_DURATION=${K6_DURATION:-1m}
    volumes:
      - ../load-testing/k6:/k6:ro
    working_dir: /k6
    command: >
      run /k6/${K6_SCRIPT:-scenarios/smoke.js}
    depends_on:
      - traefik

networks:
  collabspace-network:
    external: true
