services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - collabspace-network

  mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    image: collabspace-mongo-rs:6
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "admin",
          "-p",
          "password",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - collabspace-network

  # One-shot: rs.initiate(rs0) after mongod is up (required for transactions + Debezium Phase 5M).
  mongo-rs-init:
    image: mongo:6
    container_name: mongo-rs-init
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./mongo/init-replica-set.js:/scripts/init-replica-set.js:ro
    entrypoint:
      [
        "mongosh",
        "--host",
        "mongo",
        "--port",
        "27017",
        "-u",
        "admin",
        "-p",
        "password",
        "--authenticationDatabase",
        "admin",
        "--file",
        "/scripts/init-replica-set.js",
      ]
    networks:
      - collabspace-network

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - collabspace-network

volumes:
  pgdata:
  mongodata:

networks:
  collabspace-network:
    driver: bridge