services:
  redis:
    image: redis:7
    container_name: redis
    env_file:
      - ../redis/.env
    ports:
      - "6379:6379"       # Redis default port
    volumes:
      - ../redis/data:/data   # Persistent data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf # Redis config
    networks:
      - collabspace-network

networks:
  collabspace-network:
    external: true