name: k6 Load Test

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: k6 scenario
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - demo-flow
          - slo-baseline
      vus:
        description: Virtual users
        required: true
        default: "10"
      duration:
        description: Duration (e.g. 1m, 2m)
        required: true
        default: 2m

jobs:
  k6-load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 ${{ github.event.inputs.scenario }}
        run: >
          docker run --rm -i
          -v ${{ github.workspace }}/infrastructure/load-testing/k6:/k6
          -e BASE_URL=https://collabspace.ngocanh2005it.site/api/v1
          -e GRAFANA_URL=https://collabspace.ngocanh2005it.site/grafana
          -e GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
          -e K6_USER_PASSWORD=${{ secrets.K6_USER_PASSWORD }}
          -e K6_VUS=${{ github.event.inputs.vus }}
          -e K6_DURATION=${{ github.event.inputs.duration }}
          -e K6_INSECURE_SKIP_TLS_VERIFY=true
          grafana/k6:latest run /k6/scenarios/${{ github.event.inputs.scenario }}.js
