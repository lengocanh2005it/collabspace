name: Build Images And Deploy



on:

  push:

    branches:

      - main

  workflow_dispatch:

    inputs:

      services:

        description: Comma-separated services to build/deploy (empty = auto on push; all services on manual)

        required: false

        default: ""

      image_tag:

        description: Optional image tag override (default per service is <service>-<sha7>)

        required: false

        default: ""

      run_e2e:

        description: Run MVP demo E2E smoke after deploy (uncheck to skip on manual runs)

        required: false

        type: boolean

        default: true

      force_full_values:

        description: Apply full values-prod.yaml (use when changing infra config like PostgreSQL replication)

        required: false

        type: boolean

        default: false



permissions:

  contents: read

  packages: write



concurrency:

  group: doks-deploy

  cancel-in-progress: false



env:

  REGISTRY: ghcr.io



jobs:

  detect-changes:

    runs-on: ubuntu-latest

    outputs:

      services: ${{ steps.matrix.outputs.services }}

      helm_chart: ${{ steps.filter.outputs.helm_chart }}

      auth_migrations: ${{ steps.migrations.outputs.auth_migrations }}

      user_migrations: ${{ steps.migrations.outputs.user_migrations }}

      workspace_migrations: ${{ steps.migrations.outputs.workspace_migrations }}

    steps:

      - uses: actions/checkout@v4



      - uses: dorny/paths-filter@v3

        id: filter

        with:

          filters: .github/path-filters.yml



      - name: Detect migration changes

        id: migrations

        shell: bash

        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "auth_migrations=true" >> "$GITHUB_OUTPUT"
            echo "user_migrations=true" >> "$GITHUB_OUTPUT"
            echo "workspace_migrations=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "auth_migrations=${{ steps.filter.outputs.auth_migrations }}" >> "$GITHUB_OUTPUT"
          echo "user_migrations=${{ steps.filter.outputs.user_migrations }}" >> "$GITHUB_OUTPUT"
          echo "workspace_migrations=${{ steps.filter.outputs.workspace_migrations }}" >> "$GITHUB_OUTPUT"



      - name: Build deploy service matrix

        id: matrix

        shell: bash

        run: |

          set -euo pipefail

          ALL_SERVICES=(auth-service user-service workspace-service task-service notification-service dlq-service analytics-service)



          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then

            raw="${{ github.event.inputs.services }}"

            if [[ -z "${raw// }" ]]; then

              json=$(printf '%s\n' "${ALL_SERVICES[@]}" | jq -R . | jq -s -c .)

              echo "services=${json}" >> "$GITHUB_OUTPUT"

              exit 0

            fi

            IFS=',' read -ra picked <<< "$raw"

            services=()

            for s in "${picked[@]}"; do

              s="${s// /}"

              [[ -n "$s" ]] && services+=("$s")

            done

            json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -s -c .)

            echo "services=${json}" >> "$GITHUB_OUTPUT"

            exit 0

          fi



          services=()

          [[ "${{ steps.filter.outputs.auth_service }}" == "true" ]] && services+=(auth-service)

          [[ "${{ steps.filter.outputs.user_service }}" == "true" ]] && services+=(user-service)

          [[ "${{ steps.filter.outputs.workspace_service }}" == "true" ]] && services+=(workspace-service)

          [[ "${{ steps.filter.outputs.task_service }}" == "true" ]] && services+=(task-service)

          [[ "${{ steps.filter.outputs.notification_service }}" == "true" ]] && services+=(notification-service)

          [[ "${{ steps.filter.outputs.dlq_service }}" == "true" ]] && services+=(dlq-service)

          [[ "${{ steps.filter.outputs.analytics_service }}" == "true" ]] && services+=(analytics-service)



          if [[ ${#services[@]} -eq 0 ]]; then

            echo "services=[]" >> "$GITHUB_OUTPUT"

          else

            json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -s -c .)

            echo "services=${json}" >> "$GITHUB_OUTPUT"

          fi



  build-images:

    runs-on: ubuntu-latest

    needs: detect-changes

    if: needs.detect-changes.outputs.services != '[]'

    strategy:

      fail-fast: false

      matrix:

        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:

      - name: Checkout

        uses: actions/checkout@v4



      - name: Set image variables

        id: vars

        shell: bash

        run: |

          owner="${GITHUB_REPOSITORY_OWNER,,}"

          sha7="${GITHUB_SHA:0:7}"

          override="${{ github.event.inputs.image_tag }}"

          if [[ -n "$override" ]]; then

            tag="$override"

          else

            tag="${{ matrix.service }}-${sha7}"

          fi

          echo "owner=$owner" >> "$GITHUB_OUTPUT"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          echo "image=ghcr.io/$owner/collabspace-${{ matrix.service }}" >> "$GITHUB_OUTPUT"



      - name: Set up Docker Buildx

        uses: docker/setup-buildx-action@v3



      - name: Login to GHCR

        uses: docker/login-action@v3

        with:

          registry: ${{ env.REGISTRY }}

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}



      - name: Build and push ${{ matrix.service }}

        uses: docker/build-push-action@v6

        with:

          context: .

          file: infrastructure/docker/Dockerfile.service

          build-args: |

            SERVICE_NAME=${{ matrix.service }}

          push: true

          tags: |

            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}

            ${{ steps.vars.outputs.image }}:latest

          cache-from: type=gha,scope=${{ matrix.service }}

          cache-to: type=gha,mode=max,scope=${{ matrix.service }}



      - name: Run Trivy vulnerability scanner

        uses: aquasecurity/trivy-action@master

        with:

          image-ref: '${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}'

          format: 'table'

          exit-code: '1'

          ignore-unfixed: true

          vuln-type: 'os,library'

          severity: 'CRITICAL,HIGH'



  deploy:

    runs-on: ubuntu-latest

    needs: [detect-changes, build-images]

    if: |

      always() &&

      !failure() &&

      !cancelled() &&

      (needs.detect-changes.outputs.services != '[]' || needs.detect-changes.outputs.helm_chart == 'true') &&

      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')

    steps:

      - name: Checkout

        uses: actions/checkout@v4



      - name: Set up Helm

        uses: azure/setup-helm@v4

        with:

          version: v3.14.0



      - name: Set up kubectl

        uses: azure/setup-kubectl@v4



      - name: Configure kubeconfig (DOKS)

        run: |

          mkdir -p $HOME/.kube

          echo "${{ secrets.KUBECONFIG_DOKS }}" | base64 -d > $HOME/.kube/config

          chmod 600 $HOME/.kube/config



      - name: Verify cluster connectivity

        run: kubectl get nodes



      - name: Add Helm repos

        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts

          helm repo update cnpg



      - name: Compute per-service image tag overrides

        id: deploy-vars

        shell: bash

        run: |

          set -euo pipefail

          services='${{ needs.detect-changes.outputs.services }}'

          sha7="${GITHUB_SHA:0:7}"

          override="${{ github.event.inputs.image_tag }}"

          helm_set_args=""

          # Migration service tags default to latest (values-prod.yaml default)
          auth_tag="latest"
          user_tag="latest"
          workspace_tag="latest"

          if [[ "$services" != "[]" ]]; then

            while IFS= read -r svc; do

              [[ -z "$svc" ]] && continue

              if [[ -n "$override" ]]; then

                tag="$override"

              else

                tag="${svc}-${sha7}"

              fi

              # Convert service name to helm key: auth-service → apps.auth-service.image.tag
              helm_set_args+=" --set apps.${svc}.image.tag=${tag}"

              # Track tags for the three PostgreSQL-backed services that need migrations
              case "$svc" in
                auth-service)      auth_tag="$tag" ;;
                user-service)      user_tag="$tag" ;;
                workspace-service) workspace_tag="$tag" ;;
              esac

            done < <(echo "$services" | jq -r '.[]')

          fi

          echo "helm_set_args=${helm_set_args}" >> "$GITHUB_OUTPUT"
          echo "auth_tag=${auth_tag}" >> "$GITHUB_OUTPUT"
          echo "user_tag=${user_tag}" >> "$GITHUB_OUTPUT"
          echo "workspace_tag=${workspace_tag}" >> "$GITHUB_OUTPUT"



      - name: Write values-prod.yaml

        run: |

          echo "${{ secrets.HELM_VALUES_PROD }}" | base64 -d > /tmp/values-prod.yaml



      - name: Detect PostgreSQL mode

        id: postgres-mode

        shell: bash

        run: |
          set -euo pipefail
          enabled="$(awk '
            /^cloudnativepg:[[:space:]]*$/ { in_block=1; next }
            in_block && /^[^[:space:]]/ { in_block=0 }
            in_block && /^[[:space:]]+enabled:[[:space:]]*true([[:space:]]*(#.*)?)?$/ { found=1; print "true"; exit }
            END { if (!found) print "false" }
          ' /tmp/values-prod.yaml)"
          echo "cloudnativepg_enabled=${enabled}" >> "$GITHUB_OUTPUT"



      - name: Detect CloudNativePG ownership

        id: cnpg-ownership

        if: steps.postgres-mode.outputs.cloudnativepg_enabled == 'true'

        shell: bash

        run: |
          set -euo pipefail
          args=""
          raw_path="/apis/postgresql.cnpg.io/v1/namespaces/collabspace/clusters/postgres"

          if cluster_json="$(kubectl get --raw "$raw_path" 2>/dev/null)"; then
            release_name="$(echo "$cluster_json" | jq -r '.metadata.annotations["meta.helm.sh/release-name"] // ""')"
            release_namespace="$(echo "$cluster_json" | jq -r '.metadata.annotations["meta.helm.sh/release-namespace"] // ""')"

            if [[ "$release_name" != "collabspace" || "$release_namespace" != "collabspace" ]]; then
              echo "==> Existing CloudNativePG cluster is not Helm-owned; disabling Cluster rendering for this deploy"
              args="--set cloudnativepg.renderCluster=false"
            fi
          fi

          echo "helm_args=${args}" >> "$GITHUB_OUTPUT"



      - name: Ensure CloudNativePG operator

        if: steps.postgres-mode.outputs.cloudnativepg_enabled == 'true'

        run: |
          if helm status cnpg -n cnpg-system >/dev/null 2>&1 && [[ "${{ needs.detect-changes.outputs.helm_chart }}" != "true" ]]; then
            echo "==> CloudNativePG operator already installed; skipping upgrade"
            exit 0
          fi

          # Adopt any pre-existing CNPG resources (installed outside Helm) so that
          # helm upgrade --install does not fail with "invalid ownership metadata".
          echo "==> Adopting pre-existing CNPG resources into Helm release 'cnpg'..."
          # Namespace-scoped resources: -n cnpg-system correctly limits scope
          for kind in deployment daemonset replicaset statefulset service serviceaccount \
                      configmap role rolebinding; do
            kubectl get "$kind" -n cnpg-system --no-headers -o name 2>/dev/null \
              | xargs -r -I{} sh -c '
                  kubectl annotate {} -n cnpg-system \
                    meta.helm.sh/release-name=cnpg \
                    meta.helm.sh/release-namespace=cnpg-system --overwrite 2>/dev/null || true
                  kubectl label {} -n cnpg-system \
                    app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true'
          done
          # Cluster-scoped resources: must grep cnpg to avoid iterating system:* resources
          for kind in clusterrole clusterrolebinding; do
            kubectl get "$kind" --no-headers -o name 2>/dev/null | grep cnpg \
              | xargs -r -I{} sh -c '
                  kubectl annotate {} \
                    meta.helm.sh/release-name=cnpg \
                    meta.helm.sh/release-namespace=cnpg-system --overwrite 2>/dev/null || true
                  kubectl label {} \
                    app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true'
          done
          # CRDs and webhook configs are cluster-scoped
          kubectl get crd --no-headers -o name 2>/dev/null | grep '\.cnpg\.io' \
            | xargs -r -I{} sh -c '
                kubectl annotate {} \
                  meta.helm.sh/release-name=cnpg \
                  meta.helm.sh/release-namespace=cnpg-system --overwrite 2>/dev/null || true
                kubectl label {} \
                  app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true'
          for kind in mutatingwebhookconfiguration validatingwebhookconfiguration; do
            kubectl get "$kind" --no-headers -o name 2>/dev/null | grep cnpg \
              | xargs -r -I{} sh -c '
                  kubectl annotate {} \
                    meta.helm.sh/release-name=cnpg \
                    meta.helm.sh/release-namespace=cnpg-system --overwrite 2>/dev/null || true
                  kubectl label {} \
                    app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true'
          done
          echo "==> Adoption complete."

          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --version 0.22.0 \
            --wait \
            --timeout 10m



      - name: Ensure namespace exists

        run: |
          kubectl create namespace collabspace --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace collabspace app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace collabspace \
            meta.helm.sh/release-name=collabspace \
            meta.helm.sh/release-namespace=collabspace \
            --overwrite

      - name: Ensure ghcr-credentials secret exists

        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          kubectl create secret docker-registry ghcr-credentials \
            --namespace collabspace \
            --docker-server=ghcr.io \
            --docker-username="${OWNER}" \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -



      - name: Prepare Helm release state

        id: release-state

        shell: bash

        run: |
          set -euo pipefail

          release_exists=false
          helm status collabspace -n collabspace >/dev/null 2>&1 && release_exists=true

          # If a previous CI run was interrupted mid-upgrade, Helm leaves the
          # release in pending-upgrade/pending-install state. Roll it back to
          # the last successful revision so migrations and the next upgrade can proceed.
          release_status=$(helm status collabspace -n collabspace -o json 2>/dev/null | jq -r '.info.status // "none"' 2>/dev/null || echo "none")
          if [[ "$release_status" == "pending-upgrade" || "$release_status" == "pending-install" || "$release_status" == "pending-rollback" ]]; then
            echo "==> Release stuck in $release_status — rolling back to last good revision"
            helm rollback collabspace 0 -n collabspace --wait --timeout 5m || true
            release_exists=false
            helm status collabspace -n collabspace >/dev/null 2>&1 && release_exists=true
          fi

          echo "exists=${release_exists}" >> "$GITHUB_OUTPUT"



      - name: Wait for existing datastores to be ready

        if: steps.release-state.outputs.exists == 'true'

        run: |
          if [[ "${{ steps.postgres-mode.outputs.cloudnativepg_enabled }}" == "true" ]]; then
            raw_path="/apis/postgresql.cnpg.io/v1/namespaces/collabspace/clusters/postgres"
            deadline=$((SECONDS + 600))

            until [[ "$SECONDS" -ge "$deadline" ]]; do
              cluster_json="$(kubectl get --raw "$raw_path" 2>/dev/null || true)"
              ready="$(echo "$cluster_json" | jq -r '.status.readyInstances // 0' 2>/dev/null || echo 0)"
              instances="$(echo "$cluster_json" | jq -r '.status.instances // 0' 2>/dev/null || echo 0)"
              phase="$(echo "$cluster_json" | jq -r '.status.phase // ""' 2>/dev/null || echo "")"
              ready="${ready:-0}"
              instances="${instances:-0}"

              echo "CloudNativePG postgres: phase=${phase:-unknown} ready=${ready}/${instances}"

              if [[ "$instances" != "0" && "$ready" == "$instances" ]]; then
                break
              fi

              sleep 10
            done

            if [[ "$ready" != "$instances" || "$instances" == "0" ]]; then
              echo "CloudNativePG cluster/postgres did not become ready in time" >&2
              exit 1
            fi
          else
            kubectl rollout status statefulset/postgres -n collabspace --timeout=10m
          fi
          kubectl rollout status statefulset/mongo -n collabspace --timeout=10m



      - name: Run DB migrations (rolling upgrade)

        if: steps.release-state.outputs.exists == 'true'

        shell: bash

        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          RUN_AUTH="${{ needs.detect-changes.outputs.auth_migrations }}"
          RUN_USER="${{ needs.detect-changes.outputs.user_migrations }}"
          RUN_WORKSPACE="${{ needs.detect-changes.outputs.workspace_migrations }}"

          echo "==> Migration flags: auth=${RUN_AUTH} user=${RUN_USER} workspace=${RUN_WORKSPACE}"

          run_migration() {
            local service_name="$1" job_name="migrate-${1%%-service}" image_tag="$2"
            echo "==> Migration: ${service_name} (tag=${image_tag})"
            kubectl delete job "${job_name}" -n collabspace --ignore-not-found
            kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${job_name}
            namespace: collabspace
            labels:
              collabspace.dev/migration: ${service_name}
          spec:
            ttlSecondsAfterFinished: 3600
            backoffLimit: 2
            template:
              metadata:
                labels:
                  collabspace.dev/migration: ${service_name}
              spec:
                restartPolicy: Never
                imagePullSecrets:
                  - name: ghcr-credentials
                containers:
                  - name: migrate
                    image: ghcr.io/${OWNER}/collabspace-${service_name}:${image_tag}
                    command:
                      - /bin/sh
                      - -c
                      - |
                        export DATABASE_URL="postgresql://\$(node -e 'console.log(encodeURIComponent(process.env.POSTGRES_USER))'):\$(node -e 'console.log(encodeURIComponent(process.env.POSTGRES_PASSWORD))')@\${POSTGRES_HOST}:5432/\${POSTGRES_DB}"
                        exec node dist/src/migrate.js
                    envFrom:
                      - configMapRef:
                          name: ${service_name}-config
                      - secretRef:
                          name: ${service_name}-secrets
          EOF
          }

          wait_migration() {
            local job=$1 deadline=$((SECONDS + 300))
            echo "==> Waiting for ${job}..."
            while [[ $SECONDS -lt $deadline ]]; do
              status=$(kubectl get job "$job" -n collabspace \
                -o jsonpath='{.status.conditions[?(@.status=="True")].type}' 2>/dev/null || echo "")
              [[ "$status" == *"Complete"* ]] && echo "  ${job}: Complete" && return 0
              if [[ "$status" == *"Failed"* ]]; then
                pod=$(kubectl get pods -n collabspace -l "job-name=$job" \
                  --sort-by=.metadata.creationTimestamp \
                  -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || echo "")
                [[ -n "$pod" ]] && kubectl logs -n collabspace "$pod" --tail=60 || true
                return 1
              fi
              sleep 5
            done
            echo "  ${job}: timeout"; return 1
          }

          if [[ "${RUN_AUTH}" != "true" && "${RUN_USER}" != "true" && "${RUN_WORKSPACE}" != "true" ]]; then
            echo "==> No PostgreSQL migrations requested; skipping."
            exit 0
          fi

          if [[ "${RUN_AUTH}" == "true" ]]; then
            run_migration auth-service "${{ steps.deploy-vars.outputs.auth_tag }}"
          fi
          if [[ "${RUN_USER}" == "true" ]]; then
            run_migration user-service "${{ steps.deploy-vars.outputs.user_tag }}"
          fi
          if [[ "${RUN_WORKSPACE}" == "true" ]]; then
            run_migration workspace-service "${{ steps.deploy-vars.outputs.workspace_tag }}"
          fi

          if [[ "${RUN_AUTH}" == "true" ]]; then
            wait_migration migrate-auth
          fi
          if [[ "${RUN_USER}" == "true" ]]; then
            wait_migration migrate-user
          fi
          if [[ "${RUN_WORKSPACE}" == "true" ]]; then
            wait_migration migrate-workspace
          fi



      - name: Helm upgrade (DOKS)

        # Existing release: --reuse-values + image tag overrides only — avoids touching
        # StatefulSet/PVC immutable fields that Kubernetes forbids patching.
        # force_full_values=true: apply full values-prod.yaml (use for infra config changes
        # like PostgreSQL replication — requires StatefulSets to be deleted manually first).
        shell: bash
        run: |
          RELEASE_EXISTS="${{ steps.release-state.outputs.exists }}"
          FORCE_FULL="${{ github.event.inputs.force_full_values }}"

          if [[ "$RELEASE_EXISTS" == "true" && "$FORCE_FULL" != "true" ]]; then
            echo "==> Existing release — upgrading with --reuse-values"
            helm upgrade collabspace infrastructure/helm/collabspace \
              --namespace collabspace \
              --timeout 20m \
              --reuse-values \
              ${{ steps.cnpg-ownership.outputs.helm_args }} \
              ${{ steps.deploy-vars.outputs.helm_set_args }}
          else
            replica_args=""
            if [[ "$RELEASE_EXISTS" != "true" ]]; then
              # Fresh installs need ConfigMaps/Secrets/datastores before migrations,
              # but app pods should not start against an unmigrated schema.
              replica_args="--set apps.auth-service.replicas=0 --set apps.user-service.replicas=0 --set apps.workspace-service.replicas=0 --set apps.task-service.replicas=0 --set apps.notification-service.replicas=0 --set apps.dlq-service.replicas=0 --set apps.analytics-service.replicas=0"
            fi

            echo "==> Applying full values-prod.yaml (fresh install or force_full_values=true)"
            helm upgrade --install collabspace infrastructure/helm/collabspace \
              --namespace collabspace \
              --timeout 20m \
              --set global.createNamespace=false \
              -f /tmp/values-prod.yaml \
              ${{ steps.cnpg-ownership.outputs.helm_args }} \
              ${{ steps.deploy-vars.outputs.helm_set_args }} \
              ${replica_args}
          fi



      - name: Wait for datastores to be ready

        if: steps.release-state.outputs.exists != 'true'

        run: |
          if [[ "${{ steps.postgres-mode.outputs.cloudnativepg_enabled }}" == "true" ]]; then
            raw_path="/apis/postgresql.cnpg.io/v1/namespaces/collabspace/clusters/postgres"
            deadline=$((SECONDS + 600))

            until [[ "$SECONDS" -ge "$deadline" ]]; do
              cluster_json="$(kubectl get --raw "$raw_path" 2>/dev/null || true)"
              ready="$(echo "$cluster_json" | jq -r '.status.readyInstances // 0' 2>/dev/null || echo 0)"
              instances="$(echo "$cluster_json" | jq -r '.status.instances // 0' 2>/dev/null || echo 0)"
              phase="$(echo "$cluster_json" | jq -r '.status.phase // ""' 2>/dev/null || echo "")"
              ready="${ready:-0}"
              instances="${instances:-0}"

              echo "CloudNativePG postgres: phase=${phase:-unknown} ready=${ready}/${instances}"

              if [[ "$instances" != "0" && "$ready" == "$instances" ]]; then
                break
              fi

              sleep 10
            done

            if [[ "$ready" != "$instances" || "$instances" == "0" ]]; then
              echo "CloudNativePG cluster/postgres did not become ready in time" >&2
              exit 1
            fi
          else
            kubectl rollout status statefulset/postgres -n collabspace --timeout=10m
          fi
          kubectl rollout status statefulset/mongo -n collabspace --timeout=10m



      - name: Run DB migrations (fresh install)

        if: steps.release-state.outputs.exists != 'true'

        shell: bash

        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          RUN_AUTH="${{ needs.detect-changes.outputs.auth_migrations }}"
          RUN_USER="${{ needs.detect-changes.outputs.user_migrations }}"
          RUN_WORKSPACE="${{ needs.detect-changes.outputs.workspace_migrations }}"

          run_migration() {
            local service_name="$1" job_name="migrate-${1%%-service}" image_tag="$2"
            echo "==> Migration: ${service_name} (tag=${image_tag})"
            kubectl delete job "${job_name}" -n collabspace --ignore-not-found
            kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${job_name}
            namespace: collabspace
            labels:
              collabspace.dev/migration: ${service_name}
          spec:
            ttlSecondsAfterFinished: 3600
            backoffLimit: 2
            template:
              metadata:
                labels:
                  collabspace.dev/migration: ${service_name}
              spec:
                restartPolicy: Never
                imagePullSecrets:
                  - name: ghcr-credentials
                containers:
                  - name: migrate
                    image: ghcr.io/${OWNER}/collabspace-${service_name}:${image_tag}
                    command:
                      - /bin/sh
                      - -c
                      - |
                        export DATABASE_URL="postgresql://\$(node -e 'console.log(encodeURIComponent(process.env.POSTGRES_USER))'):\$(node -e 'console.log(encodeURIComponent(process.env.POSTGRES_PASSWORD))')@\${POSTGRES_HOST}:5432/\${POSTGRES_DB}"
                        exec node dist/src/migrate.js
                    envFrom:
                      - configMapRef:
                          name: ${service_name}-config
                      - secretRef:
                          name: ${service_name}-secrets
          EOF
          }

          wait_migration() {
            local job=$1 deadline=$((SECONDS + 300))
            echo "==> Waiting for ${job}..."
            while [[ $SECONDS -lt $deadline ]]; do
              status=$(kubectl get job "$job" -n collabspace \
                -o jsonpath='{.status.conditions[?(@.status=="True")].type}' 2>/dev/null || echo "")
              [[ "$status" == *"Complete"* ]] && echo "  ${job}: Complete" && return 0
              if [[ "$status" == *"Failed"* ]]; then
                pod=$(kubectl get pods -n collabspace -l "job-name=$job" \
                  --sort-by=.metadata.creationTimestamp \
                  -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || echo "")
                [[ -n "$pod" ]] && kubectl logs -n collabspace "$pod" --tail=60 || true
                return 1
              fi
              sleep 5
            done
            echo "  ${job}: timeout"; return 1
          }

          if [[ "${RUN_AUTH}" != "true" && "${RUN_USER}" != "true" && "${RUN_WORKSPACE}" != "true" ]]; then
            echo "==> No PostgreSQL migrations requested; skipping."
            exit 0
          fi

          if [[ "${RUN_AUTH}" == "true" ]]; then
            run_migration auth-service "${{ steps.deploy-vars.outputs.auth_tag }}"
          fi
          if [[ "${RUN_USER}" == "true" ]]; then
            run_migration user-service "${{ steps.deploy-vars.outputs.user_tag }}"
          fi
          if [[ "${RUN_WORKSPACE}" == "true" ]]; then
            run_migration workspace-service "${{ steps.deploy-vars.outputs.workspace_tag }}"
          fi

          if [[ "${RUN_AUTH}" == "true" ]]; then
            wait_migration migrate-auth
          fi
          if [[ "${RUN_USER}" == "true" ]]; then
            wait_migration migrate-user
          fi
          if [[ "${RUN_WORKSPACE}" == "true" ]]; then
            wait_migration migrate-workspace
          fi



      - name: Enable app deployments after fresh install

        if: steps.release-state.outputs.exists != 'true'

        run: |
          helm upgrade collabspace infrastructure/helm/collabspace \
            --namespace collabspace \
            --timeout 20m \
            -f /tmp/values-prod.yaml \
            ${{ steps.cnpg-ownership.outputs.helm_args }} \
            ${{ steps.deploy-vars.outputs.helm_set_args }}



      - name: Verify rollout

        run: |

          kubectl rollout status deployment/auth-service -n collabspace --timeout=5m

          kubectl rollout status deployment/user-service -n collabspace --timeout=5m

          kubectl rollout status deployment/workspace-service -n collabspace --timeout=5m

          kubectl rollout status deployment/task-service -n collabspace --timeout=5m

          kubectl rollout status deployment/notification-service -n collabspace --timeout=5m

          kubectl rollout status deployment/dlq-service -n collabspace --timeout=5m

          kubectl rollout status deployment/analytics-service -n collabspace --timeout=5m



      - name: Health check all services
        run: |
          set -euo pipefail

          check_service() {
            local name=$1
            local svc=$2
            local port=$3
            local path=$4
            local max_attempts=36   # 3 minutes @ 5s each
            local attempt=0

            echo "==> Health check: ${name} (${path})"
            while [[ $attempt -lt $max_attempts ]]; do
              attempt=$((attempt + 1))
              output=$(kubectl exec -n collabspace \
                "$(kubectl get pod -n collabspace -l app=${svc} -o jsonpath='{.items[0].metadata.name}')" \
                -- wget -qO- -S "http://localhost:${port}${path}" 2>&1 || true)
              code=$(printf '%s\n' "$output" | awk '/HTTP\// { code=$2 } END { print code ? code : "000" }')
              if [[ "$code" == "200" ]]; then
                echo "  [OK] ${name} healthy (attempt ${attempt})"
                return 0
              fi
              echo "  [WAIT] ${name} HTTP ${code} (attempt ${attempt}/${max_attempts}), retry in 5s..."
              sleep 5
            done
            echo "  [FAIL] ${name} did not become healthy after $((max_attempts * 5))s"
            return 1
          }

          pids=()
          check_service "auth-service"          "auth-service"          3000 "/api/v1/auth/health/ready" & pids+=("$!")
          check_service "user-service"          "user-service"          3000 "/api/v1/users/health/ready" & pids+=("$!")
          check_service "workspace-service"     "workspace-service"     8080 "/api/v1/workspaces/health/ready" & pids+=("$!")
          check_service "task-service"          "task-service"          3000 "/api/v1/tasks/health/ready" & pids+=("$!")
          check_service "notification-service"  "notification-service"  3000 "/api/v1/notifications/health/ready" & pids+=("$!")
          check_service "dlq-service"           "dlq-service"           3000 "/api/v1/dlq/health/ready" & pids+=("$!")
          check_service "analytics-service"     "analytics-service"     3000 "/api/v1/analytics/health/ready" & pids+=("$!")

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done

          if [[ "$failed" != "0" ]]; then
            echo "==> One or more services failed health checks"
            exit 1
          fi

          echo "==> All services healthy."

      - name: Force DNS resolution to DOKS LoadBalancer
        run: |
          echo "==> Fetching Traefik LoadBalancer IP..."
          LB_IP=$(kubectl get svc traefik -n collabspace -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Traefik IP: $LB_IP"
          if [[ -n "$LB_IP" ]]; then
            echo "$LB_IP collabspace.ngocanh2005it.site" | sudo tee -a /etc/hosts
          else
            echo "Failed to retrieve LoadBalancer IP!"
            exit 1
          fi

      - name: Run MVP demo E2E smoke

        if: github.event_name == 'push' || github.event.inputs.run_e2e != 'false'

        env:

          BASE_URL: https://collabspace.ngocanh2005it.site/api/v1

          DEMO_E2E_OTP_SCRIPT: scripts/get-otp-prod.sh

        run: |

          python3 --version 2>/dev/null || sudo apt-get install -y -qq python3 > /dev/null
          chmod +x scripts/get-otp-prod.sh

          echo "==> MVP demo E2E smoke (via Traefik LB)..."

          bash scripts/demo-e2e.sh
