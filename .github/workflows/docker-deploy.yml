name: Build Images And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build and deploy
        required: false
        default: latest

permissions:
  contents: read
  packages: write

concurrency:
  group: k3s-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.filter.outputs.auth-service }}
      user-service: ${{ steps.filter.outputs.user-service }}
      workspace-service: ${{ steps.filter.outputs.workspace-service }}
      task-service: ${{ steps.filter.outputs.task-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      any-service: ${{ steps.filter.outputs.any-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
              - 'infrastructure/docker/Dockerfile.service'
              - 'package.json'
              - 'pnpm-workspace.yaml'
            user-service:
              - 'services/user-service/**'
              - 'infrastructure/docker/Dockerfile.service'
              - 'package.json'
              - 'pnpm-workspace.yaml'
            workspace-service:
              - 'services/workspace-service/**'
              - 'infrastructure/docker/Dockerfile.service'
              - 'package.json'
              - 'pnpm-workspace.yaml'
            task-service:
              - 'services/task-service/**'
              - 'infrastructure/docker/Dockerfile.service'
              - 'package.json'
              - 'pnpm-workspace.yaml'
            notification-service:
              - 'services/notification-service/**'
              - 'infrastructure/docker/Dockerfile.service'
              - 'package.json'
              - 'pnpm-workspace.yaml'
            any-service:
              - 'services/**'
              - 'infrastructure/docker/Dockerfile.service'
              - 'package.json'
              - 'pnpm-workspace.yaml'

  build-images:
    runs-on: ubuntu-latest
    needs: detect-changes
    # workflow_dispatch luôn build tất cả; push chỉ build service có thay đổi
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.any-service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            changed: ${{ needs.detect-changes.outputs.auth-service }}
          - service: user-service
            changed: ${{ needs.detect-changes.outputs.user-service }}
          - service: workspace-service
            changed: ${{ needs.detect-changes.outputs.workspace-service }}
          - service: task-service
            changed: ${{ needs.detect-changes.outputs.task-service }}
          - service: notification-service
            changed: ${{ needs.detect-changes.outputs.notification-service }}
    steps:
      - name: Skip unchanged service
        if: github.event_name != 'workflow_dispatch' && matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping build."

      - name: Checkout
        if: github.event_name == 'workflow_dispatch' || matrix.changed == 'true'
        uses: actions/checkout@v4

      - name: Set image variables
        if: github.event_name == 'workflow_dispatch' || matrix.changed == 'true'
        id: vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          tag="${{ github.event.inputs.image_tag || github.sha }}"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$owner/collabspace-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: github.event_name == 'workflow_dispatch' || matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'workflow_dispatch' || matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        if: github.event_name == 'workflow_dispatch' || matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.service
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-images]
    # always() cho phép deploy chạy kể cả khi build-images bị skip (helm-only changes)
    if: |
      always() &&
      !failure() &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout (for helm chart hash)
        uses: actions/checkout@v4

      - name: Compute Helm chart hash
        id: helm-hash
        run: |
          hash=$(sha256sum infrastructure/helm/collabspace/Chart.yaml | cut -d' ' -f1)
          echo "chart_hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Cache Helm dependencies
        id: helm-cache
        uses: actions/cache@v4
        with:
          path: infrastructure/helm/collabspace/charts
          key: helm-deps-${{ steps.helm-hash.outputs.chart_hash }}

      - name: Package Helm deps for Droplet
        if: steps.helm-cache.outputs.cache-hit != 'true'
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash -s -- --version v3.14.0
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add traefik https://traefik.github.io/charts
          helm repo update
          helm dependency update infrastructure/helm/collabspace

      - name: Upload Helm charts to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: infrastructure/helm/collabspace/charts
          target: /opt/collabspace

      - name: Deploy Helm on k3s over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SKIP_HELM_DEP_UPDATE: "true"
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          envs: IMAGE_TAG,GHCR_OWNER,GHCR_USERNAME,GHCR_TOKEN,SKIP_HELM_DEP_UPDATE
          script: |
            set -euo pipefail
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            export APP_DIR=/opt/collabspace
            export PHASE0_ENV=/opt/collabspace/infrastructure/deploy/phase0.env
            export GITHUB_TOKEN="${GHCR_TOKEN}"
            if [[ -f "$PHASE0_ENV" ]]; then
              bash /opt/collabspace/infrastructure/deploy/git-sync-private-repo.sh
            else
              cd /opt/collabspace && git pull --ff-only
            fi
            cd /opt/collabspace
            export APP_DIR=/opt/collabspace
            export IMAGE_TAG
            export GHCR_OWNER
            export GHCR_USERNAME
            export GHCR_TOKEN
            export SKIP_HELM_DEP_UPDATE
            bash infrastructure/deploy/helm-deploy-ci.sh
            bash infrastructure/deploy/verify-k8s-readiness.sh
