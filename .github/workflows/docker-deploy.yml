name: Build Images And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build and deploy
        required: false
        default: latest

permissions:
  contents: read
  packages: write

concurrency:
  group: droplet-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - workspace-service
          - task-service
          - notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image variables
        id: vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          tag="${{ github.event.inputs.image_tag || github.sha }}"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$owner/collabspace-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.service
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: IMAGE_REGISTRY,IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd /opt/collabspace
            git pull --ff-only
            if [ ! -f infrastructure/deploy/droplet.env ]; then
              cp infrastructure/deploy/droplet.env.example infrastructure/deploy/droplet.env
            fi
            image_registry="$(printf '%s' "$IMAGE_REGISTRY" | tr '[:upper:]' '[:lower:]')"
            sed -i "s#^COLLABSPACE_IMAGE_REGISTRY=.*#COLLABSPACE_IMAGE_REGISTRY=${image_registry}#" infrastructure/deploy/droplet.env
            sed -i "s#^COLLABSPACE_IMAGE_TAG=.*#COLLABSPACE_IMAGE_TAG=${IMAGE_TAG}#" infrastructure/deploy/droplet.env
            COLLABSPACE_IMAGE_REGISTRY="$image_registry" COLLABSPACE_IMAGE_TAG="$IMAGE_TAG" GHCR_USERNAME="$GHCR_USERNAME" GHCR_TOKEN="$GHCR_TOKEN" bash infrastructure/deploy/droplet-deploy.sh
