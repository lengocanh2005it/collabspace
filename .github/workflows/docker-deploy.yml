name: Build Images And Deploy



on:

  push:

    branches:

      - main

  workflow_dispatch:

    inputs:

      services:

        description: Comma-separated services to build/deploy (empty = auto on push; all services on manual)

        required: false

        default: ""

      image_tag:

        description: Optional image tag override (default per service is <service>-<sha7>)

        required: false

        default: ""

      run_e2e:

        description: Run MVP demo E2E smoke after deploy (uncheck to skip on manual runs)

        required: false

        type: boolean

        default: true



permissions:

  contents: read

  packages: write



concurrency:

  group: doks-deploy

  cancel-in-progress: false



env:

  REGISTRY: ghcr.io



jobs:

  detect-changes:

    runs-on: ubuntu-latest

    outputs:

      services: ${{ steps.matrix.outputs.services }}

      helm_chart: ${{ steps.filter.outputs.helm_chart }}

    steps:

      - uses: actions/checkout@v4



      - uses: dorny/paths-filter@v3

        id: filter

        with:

          filters: .github/path-filters.yml



      - name: Build deploy service matrix

        id: matrix

        shell: bash

        run: |

          set -euo pipefail

          ALL_SERVICES=(auth-service user-service workspace-service task-service notification-service dlq-service analytics-service)



          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then

            raw="${{ github.event.inputs.services }}"

            if [[ -z "${raw// }" ]]; then

              json=$(printf '%s\n' "${ALL_SERVICES[@]}" | jq -R . | jq -s -c .)

              echo "services=${json}" >> "$GITHUB_OUTPUT"

              exit 0

            fi

            IFS=',' read -ra picked <<< "$raw"

            services=()

            for s in "${picked[@]}"; do

              s="${s// /}"

              [[ -n "$s" ]] && services+=("$s")

            done

            json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -s -c .)

            echo "services=${json}" >> "$GITHUB_OUTPUT"

            exit 0

          fi



          services=()

          [[ "${{ steps.filter.outputs.auth_service }}" == "true" ]] && services+=(auth-service)

          [[ "${{ steps.filter.outputs.user_service }}" == "true" ]] && services+=(user-service)

          [[ "${{ steps.filter.outputs.workspace_service }}" == "true" ]] && services+=(workspace-service)

          [[ "${{ steps.filter.outputs.task_service }}" == "true" ]] && services+=(task-service)

          [[ "${{ steps.filter.outputs.notification_service }}" == "true" ]] && services+=(notification-service)

          [[ "${{ steps.filter.outputs.dlq_service }}" == "true" ]] && services+=(dlq-service)

          [[ "${{ steps.filter.outputs.analytics_service }}" == "true" ]] && services+=(analytics-service)



          if [[ ${#services[@]} -eq 0 ]]; then

            echo "services=[]" >> "$GITHUB_OUTPUT"

          else

            json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -s -c .)

            echo "services=${json}" >> "$GITHUB_OUTPUT"

          fi



  build-images:

    runs-on: ubuntu-latest

    needs: detect-changes

    if: needs.detect-changes.outputs.services != '[]'

    strategy:

      fail-fast: false

      matrix:

        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:

      - name: Checkout

        uses: actions/checkout@v4



      - name: Set image variables

        id: vars

        shell: bash

        run: |

          owner="${GITHUB_REPOSITORY_OWNER,,}"

          sha7="${GITHUB_SHA:0:7}"

          override="${{ github.event.inputs.image_tag }}"

          if [[ -n "$override" ]]; then

            tag="$override"

          else

            tag="${{ matrix.service }}-${sha7}"

          fi

          echo "owner=$owner" >> "$GITHUB_OUTPUT"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          echo "image=ghcr.io/$owner/collabspace-${{ matrix.service }}" >> "$GITHUB_OUTPUT"



      - name: Set up Docker Buildx

        uses: docker/setup-buildx-action@v3



      - name: Login to GHCR

        uses: docker/login-action@v3

        with:

          registry: ${{ env.REGISTRY }}

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}



      - name: Build and push ${{ matrix.service }}

        uses: docker/build-push-action@v6

        with:

          context: .

          file: infrastructure/docker/Dockerfile.service

          build-args: |

            SERVICE_NAME=${{ matrix.service }}

          push: true

          tags: |

            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}

            ${{ steps.vars.outputs.image }}:latest

          cache-from: type=gha,scope=${{ matrix.service }}

          cache-to: type=gha,mode=max,scope=${{ matrix.service }}



      - name: Run Trivy vulnerability scanner

        uses: aquasecurity/trivy-action@master

        with:

          image-ref: '${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}'

          format: 'table'

          exit-code: '1'

          ignore-unfixed: true

          vuln-type: 'os,library'

          severity: 'CRITICAL,HIGH'



  deploy:

    runs-on: ubuntu-latest

    needs: [detect-changes, build-images]

    if: |

      always() &&

      !failure() &&

      !cancelled() &&

      (needs.detect-changes.outputs.services != '[]' || needs.detect-changes.outputs.helm_chart == 'true') &&

      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')

    steps:

      - name: Checkout

        uses: actions/checkout@v4



      - name: Set up Helm

        uses: azure/setup-helm@v4

        with:

          version: v3.14.0



      - name: Set up kubectl

        uses: azure/setup-kubectl@v4



      - name: Configure kubeconfig (DOKS)

        run: |

          mkdir -p $HOME/.kube

          echo "${{ secrets.KUBECONFIG_DOKS }}" | base64 -d > $HOME/.kube/config

          chmod 600 $HOME/.kube/config



      - name: Verify cluster connectivity

        run: kubectl get nodes



      - name: Add Helm repos (for template rendering only)

        run: |

          helm repo add grafana https://grafana.github.io/helm-charts

          helm repo add bitnami https://charts.bitnami.com/bitnami

          helm repo add traefik https://traefik.github.io/charts

          helm repo update



      - name: Compute per-service image tag overrides

        id: deploy-vars

        shell: bash

        run: |

          set -euo pipefail

          services='${{ needs.detect-changes.outputs.services }}'

          sha7="${GITHUB_SHA:0:7}"

          override="${{ github.event.inputs.image_tag }}"

          helm_set_args=""

          if [[ "$services" != "[]" ]]; then

            while IFS= read -r svc; do

              [[ -z "$svc" ]] && continue

              if [[ -n "$override" ]]; then

                tag="$override"

              else

                tag="${svc}-${sha7}"

              fi

              # Convert service name to helm key: auth-service → apps.auth-service.image.tag

              helm_set_args+=" --set apps.${svc}.image.tag=${tag}"

            done < <(echo "$services" | jq -r '.[]')

          fi

          echo "helm_set_args=${helm_set_args}" >> "$GITHUB_OUTPUT"



      - name: Write values-prod.yaml

        run: |

          echo "${{ secrets.HELM_VALUES_PROD }}" | base64 -d > /tmp/values-prod.yaml



      - name: Ensure namespace exists

        run: kubectl create namespace collabspace --dry-run=client -o yaml | kubectl apply -f -



      - name: Helm upgrade (DOKS)

        run: |

          helm upgrade --install collabspace infrastructure/helm/collabspace \

            --namespace collabspace \

            --timeout 20m \

            --wait \

            --set global.createNamespace=false \

            -f /tmp/values-prod.yaml \

            ${{ steps.deploy-vars.outputs.helm_set_args }}



      - name: Verify rollout

        run: |

          kubectl rollout status deployment/auth-service -n collabspace --timeout=5m

          kubectl rollout status deployment/user-service -n collabspace --timeout=5m

          kubectl rollout status deployment/workspace-service -n collabspace --timeout=5m

          kubectl rollout status deployment/task-service -n collabspace --timeout=5m

          kubectl rollout status deployment/notification-service -n collabspace --timeout=5m



      - name: Run MVP demo E2E smoke

        if: github.event_name == 'push' || github.event.inputs.run_e2e != 'false'

        env:

          BASE_URL: https://collabspace.ngocanh2005it.site/api/v1

        run: |

          echo "==> MVP demo E2E smoke (via Traefik LB)..."

          bash scripts/demo-e2e.sh
