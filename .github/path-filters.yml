# Per-service path filters for CI/CD (dorny/paths-filter).
# Shared paths are duplicated per service so a change to packages/shared
# triggers CI/build for every app service.

shared:
  - 'packages/shared/**'
  - 'packages/nest-auth/**'
  - 'packages/eslint-config/**'
  - 'package.json'
  - 'pnpm-workspace.yaml'
  - 'pnpm-lock.yaml'
  - 'biome.json'
  - 'infrastructure/docker/Dockerfile.service'
  - '.github/path-filters.yml'
  - '.github/workflows/ci.yml'
  - '.github/workflows/docker-deploy.yml'

auth_service:
  - 'services/auth-service/**'
  - 'packages/shared/**'
  - 'packages/nest-auth/**'
  - 'packages/typeorm-migrate/**'
